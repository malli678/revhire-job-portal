<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Job Overview - RevHire</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f2f5;
            color: #1a202c;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .main-card {
            background: white;
            border-radius: 20px;
            padding: 45px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
            padding-bottom: 25px;
            border-bottom: 1px solid #edf2f7;
        }

        .header-section h2 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 800;
            color: #1e293b;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .info-box {
            background: #f8fafc;
            padding: 20px;
            border-radius: 14px;
            border: 1px solid #edf2f7;
        }

        .label {
            font-size: 0.75rem;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
        }

        .value {
            font-size: 1.1rem;
            font-weight: 700;
            color: #334155;
        }

        .full-width {
            grid-column: span 2;
        }

        .description-box {
            line-height: 1.7;
            color: #475569;
            font-size: 1.05rem;
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            margin-top: 10px;
        }

        .actions {
            margin-top: 40px;
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-back {
            background: #f1f5f9;
            color: #475569;
        }

        .btn-back:hover {
            background: #e2e8f0;
        }

        .btn-edit {
            background: #4F46E5;
            color: white;
        }

        .btn-edit:hover {
            background: #4338ca;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        hr {
            border: 0;
            border-top: 1px solid #edf2f7;
            margin: 30px 0;
        }
    </style>
    <!-- Common Fragments Styles -->
    <style th:replace="fragments/header :: header-css"></style>
    <style th:replace="fragments/footer :: footer-css"></style>
</head>

<body>

    <div th:replace="fragments/header :: header"></div>

    <div class="container">
        <div class="main-card">
            <div class="header-section">
                <h2 th:text="${job.title}">Job Title</h2>
                <div style="font-weight: 600; color: #4F46E5;" th:text="${job.jobType}">Full-time</div>
            </div>

            <div class="info-grid">
                <div class="info-box">
                    <div class="label">Organization</div>
                    <div class="value" th:text="${job.employer.companyName}">Company</div>
                </div>
                <div class="info-box">
                    <div class="label">Field Location</div>
                    <div class="value" th:text="${job.location}">Place</div>
                </div>
                <div class="info-box">
                    <div class="label">Experience Req.</div>
                    <div class="value" th:text="${job.experienceRequired ?: 'Not Specified'}">Exp</div>
                </div>
                <div class="info-box">
                    <div class="label">Compensation Range</div>
                    <div class="value">
                        <th:block th:if="${job.salaryMin != null and job.salaryMax != null}">
                            ₹<span th:text="${#numbers.formatInteger(job.salaryMin, 1, 'COMMA')}"></span> - ₹<span
                                th:text="${#numbers.formatInteger(job.salaryMax, 1, 'COMMA')}"></span>
                        </th:block>
                        <th:block th:unless="${job.salaryMin != null and job.salaryMax != null}">Competitive Rate
                        </th:block>
                    </div>
                </div>

                <div class="info-box full-width" th:if="${job.deadline != null}">
                    <div class="label">Application Deadline</div>
                    <div class="value" style="color: #ef4444;"
                        th:text="${#temporals.format(job.deadline, 'dd MMM yyyy, HH:mm')}">Date</div>
                </div>

                <div class="info-box full-width">
                    <div class="label">Core Mandate & Overview</div>
                    <div class="description-box" th:text="${job.description}" style="white-space: pre-line;">Description
                    </div>
                </div>
            </div>

            <div class="actions">
                <a th:href="@{/employer/manage-jobs}" class="btn btn-back">← Back to Console</a>
                <a th:href="@{'/employer/edit-job/' + ${job.jobId}}" class="btn btn-edit">✏️ Refine Posting</a>
            </div>
        </div>
    </div>

    <footer th:replace="fragments/footer :: footer"></footer>

    <script th:replace="fragments/header :: header-js"></script>
</body>

</html>
