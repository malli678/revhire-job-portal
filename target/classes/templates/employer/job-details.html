<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Job Overview - RevHire</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Common Fragments Styles -->
    <style th:replace="~{fragments/header :: header-css}"></style>
    <style th:replace="~{fragments/footer :: footer-css}"></style>
</head>

<body class="bg-light">

    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container py-5" style="max-width: 900px; min-height: 80vh;">
        
        <div class="mb-4 d-flex justify-content-between align-items-center flex-wrap gap-3">
            <a th:href="@{/employer/manage-jobs}" class="btn btn-light fw-bold text-secondary border px-3 py-2 rounded-3 text-decoration-none">
                <i class="bi bi-arrow-left"></i> Back to Console
            </a>
            <a th:href="@{'/employer/edit-job/' + ${job.jobId}}" class="btn btn-primary fw-bold text-white px-3 py-2 rounded-3 text-decoration-none">
                <i class="bi bi-pencil-square"></i> Refine Posting
            </a>
        </div>

        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-header bg-white border-bottom p-4 p-md-5 d-flex justify-content-between align-items-center flex-wrap gap-3 rounded-top-4">
                <h2 class="h3 fw-bold text-dark m-0 d-flex align-items-center gap-2" th:text="${job.title}">
                    Job Title
                </h2>
                <span class="badge bg-primary bg-opacity-10 text-primary border border-primary-subtle rounded-pill px-3 py-2 fs-6 fw-bold" th:text="${job.jobType}">
                    Full-time
                </span>
            </div>

            <div class="card-body p-4 p-md-5">
                <div class="row g-4 mb-5">
                    <div class="col-sm-6">
                        <div class="bg-light p-4 rounded-4 border border-light-subtle h-100">
                            <div class="text-secondary small fw-bold text-uppercase tracking-wider mb-2 d-flex align-items-center gap-2">
                                <i class="bi bi-building text-muted"></i> Organization
                            </div>
                            <div class="fw-bold text-dark fs-5" th:text="${job.employer.companyName}">Company</div>
                        </div>
                    </div>

                    <div class="col-sm-6">
                        <div class="bg-light p-4 rounded-4 border border-light-subtle h-100">
                            <div class="text-secondary small fw-bold text-uppercase tracking-wider mb-2 d-flex align-items-center gap-2">
                                <i class="bi bi-geo-alt-fill text-muted"></i> Field Location
                            </div>
                            <div class="fw-bold text-dark fs-5" th:text="${job.location}">Place</div>
                        </div>
                    </div>

                    <div class="col-sm-6">
                        <div class="bg-light p-4 rounded-4 border border-light-subtle h-100">
                            <div class="text-secondary small fw-bold text-uppercase tracking-wider mb-2 d-flex align-items-center gap-2">
                                <i class="bi bi-bar-chart-fill text-muted"></i> Experience Req.
                            </div>
                            <div class="fw-bold text-dark fs-5" th:text="${job.experienceRequired ?: 'Not Specified'}">Exp</div>
                        </div>
                    </div>

                    <div class="col-sm-6">
                        <div class="bg-light p-4 rounded-4 border border-light-subtle h-100">
                            <div class="text-secondary small fw-bold text-uppercase tracking-wider mb-2 d-flex align-items-center gap-2">
                                <i class="bi bi-cash-stack text-muted"></i> Compensation Range
                            </div>
                            <div class="fw-bold text-dark fs-5">
                                <th:block th:if="${job.salaryMin != null and job.salaryMax != null}">
                                    ₹<span th:text="${#numbers.formatInteger(job.salaryMin, 1, 'COMMA')}"></span> - ₹<span th:text="${#numbers.formatInteger(job.salaryMax, 1, 'COMMA')}"></span>
                                </th:block>
                                <th:block th:unless="${job.salaryMin != null and job.salaryMax != null}">
                                    Competitive Rate
                                </th:block>
                            </div>
                        </div>
                    </div>

                    <div class="col-12" th:if="${job.deadline != null}">
                        <div class="bg-danger bg-opacity-10 border border-danger-subtle p-4 rounded-4 d-flex justify-content-between align-items-center flex-wrap gap-2">
                            <div class="text-danger small fw-bold text-uppercase tracking-wider d-flex align-items-center gap-2">
                                <i class="bi bi-hourglass-split"></i> Application Deadline
                            </div>
                            <div class="fw-bold text-danger fs-5" th:text="${#temporals.format(job.deadline, 'dd MMM yyyy, HH:mm')}">Date</div>
                        </div>
                    </div>
                </div>

                <div class="mb-2">
                    <h3 class="h5 fw-bold text-dark mb-4 d-flex align-items-center gap-2 pb-3 border-bottom border-light-subtle">
                        <i class="bi bi-list-task text-primary"></i> Core Mandate & Overview
                    </h3>
                    <div class="bg-white p-4 rounded-4 border border-light-subtle shadow-sm lh-lg text-secondary fs-5" style="white-space: pre-line;" th:text="${job.description}">
                        Description
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
    <script th:replace="~{fragments/header :: header-js}"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
