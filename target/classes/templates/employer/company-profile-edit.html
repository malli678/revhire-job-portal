<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Edit Company Profile - RevHire</title>
    <meta charset="UTF-8">

    <style>

        body{
            font-family:'Segoe UI', Arial, sans-serif;
            background:linear-gradient(135deg,#eef2ff,#f8fafc);
            margin:0;
            padding:50px 20px;
        }

        .container{
            max-width:800px;
            margin:auto;
        }

        .card{
            background:white;
            padding:35px;
            border-radius:18px;
            box-shadow:0 10px 35px rgba(0,0,0,0.08);
        }

        h2{
            margin-top:0;
            margin-bottom:25px;
        }

        label{
            font-size:13px;
            font-weight:600;
            color:#4a5568;
            display:block;
            margin-top:15px;
            margin-bottom:6px;
        }

        input, textarea{
            width:100%;
            padding:10px;
            border-radius:8px;
            border:1px solid #e2e8f0;
            font-size:14px;
        }

        textarea{
            height:90px;
            resize:none;
        }

        .actions{
            margin-top:25px;
            display:flex;
            gap:10px;
        }

        .btn{
            padding:10px 18px;
            border:none;
            border-radius:10px;
            cursor:pointer;
            font-weight:600;
        }

        .save-btn{
            background:#667eea;
            color:white;
        }

        .save-btn:hover{
            background:#5a67d8;
        }

        .cancel-btn{
            background:#718096;
            color:white;
            text-decoration:none;
            display:inline-block;
        }

        .cancel-btn:hover{
            background:#4a5568;
        }

        .success{
            background:#f0fff4;
            color:#38a169;
            padding:10px;
            border-radius:10px;
            margin-bottom:15px;
            font-size:14px;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="card">

        <h2>✏ Edit Company Profile</h2>

        <!-- SUCCESS MESSAGE -->
        <div th:if="${successMessage}" class="success">
            <span th:text="${successMessage}"></span>
        </div>

        <form th:action="@{/employer/company-profile/update}"
              method="post"
              th:object="${profileDto}">

            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}" />

            <label>Company Name</label>
            <input type="text" th:field="*{companyName}" required/>

            <label>Industry</label>
            <input type="text" th:field="*{industry}" />

            <label>Company Size</label>
            <input type="text" th:field="*{companySize}" />

            <label>Website</label>
            <input type="text" th:field="*{companyWebsite}" />

            <label>Description</label>
            <textarea th:field="*{companyDescription}"></textarea>

            <label>Headquarters</label>
            <input type="text" th:field="*{headquarters}" />

            <div class="actions">

                <button type="submit" class="btn save-btn">
                    Save Changes
                </button>

                <a href="/employer/company-profile"
                   class="btn cancel-btn">
                    Cancel
                </a>

            </div>

        </form>

    </div>

</div>

</body>
</html>
