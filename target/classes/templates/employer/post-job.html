<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Post Job - RevHire</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f2f5;
            color: #1a202c;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .main-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .header-section {
            margin-bottom: 35px;
            padding-bottom: 20px;
            border-bottom: 1px solid #edf2f7;
            text-align: center;
        }

        .header-section h2 {
            margin: 0;
            font-size: 1.8rem;
            color: #2d3748;
            font-weight: 700;
        }

        .job-form {
            display: grid;
            gap: 25px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 700;
            color: #4a5568;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        label.required::after {
            content: " *";
            color: #e53e3e;
        }

        input,
        textarea,
        select {
            padding: 12px 16px;
            border-radius: 10px;
            border: 2px solid #edf2f7;
            background: #f8fafc;
            font-size: 1rem;
            transition: all 0.2s;
            color: #2d3748;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #4F46E5;
            background: white;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        textarea {
            height: 150px;
            resize: vertical;
        }

        .hint {
            font-size: 0.75rem;
            color: #a0aec0;
            margin-top: 4px;
        }

        .form-actions {
            margin-top: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            padding: 14px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            text-decoration: none;
            border: none;
        }

        .btn-submit {
            background: #4F46E5;
            color: white;
        }

        .btn-submit:hover {
            background: #4338ca;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        .btn-cancel {
            background: #f1f5f9;
            color: #475569;
        }

        .btn-cancel:hover {
            background: #e2e8f0;
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <!-- Common Fragments Styles -->
    <style th:replace="fragments/header :: header-css"></style>
    <style th:replace="fragments/footer :: footer-css"></style>
</head>

<body>

    <div th:replace="fragments/header :: header"></div>

    <div class="container">
        <div class="main-card">
            <div class="header-section">
                <h2>📝 Post New Opportunity</h2>
            </div>

            <form th:action="@{/jobs/save}" method="post" th:object="${jobDto}" class="job-form" id="postJobForm"
                novalidate>

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div class="form-group">
                    <label class="required">Job Title</label>
                    <input type="text" th:field="*{title}" id="title" placeholder="e.g. Senior Full Stack Engineer"
                        required />
                    <span class="error client-error" id="titleError"
                        style="color: #e53e3e; font-size: 0.8rem; margin-top: 4px;"></span>
                    <div class="hint">Use a clear, descriptive title</div>
                </div>

                <div class="form-group">
                    <label class="required">Job Description</label>
                    <textarea th:field="*{description}" id="description"
                        placeholder="Detail the responsibilities, requirements, and culture..." required></textarea>
                    <span class="error client-error" id="descriptionError"
                        style="color: #e53e3e; font-size: 0.8rem; margin-top: 4px;"></span>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="required">Location</label>
                        <input type="text" th:field="*{location}" id="location"
                            placeholder="e.g. Hyderabad, IN or Remote" required />
                        <span class="error client-error" id="locationError"
                            style="color: #e53e3e; font-size: 0.8rem; margin-top: 4px;"></span>
                    </div>

                    <div class="form-group">
                        <label class="required">Job Type</label>
                        <select th:field="*{jobType}" id="jobType" required>
                            <option value="">Select Category</option>
                            <option value="Full-time">Full-time</option>
                            <option value="Part-time">Part-time</option>
                            <option value="Contract">Contract</option>
                            <option value="Internship">Internship</option>
                            <option value="Freelance">Freelance</option>
                        </select>
                        <span class="error client-error" id="jobTypeError"
                            style="color: #e53e3e; font-size: 0.8rem; margin-top: 4px;"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="required">Core Skills Required</label>
                    <input type="text" name="skillsRequired" id="skillsRequired" placeholder="e.g. Java, React, Docker"
                        th:value="*{skillsRequired}" required />
                    <span class="error client-error" id="skillsRequiredError"
                        style="color: #e53e3e; font-size: 0.8rem; margin-top: 4px;"></span>
                    <div class="hint">Separate with commas (e.g. Java, Python, AWS)</div>
                </div>

                <div class="form-group">
                    <label>Preferred Education</label>
                    <input type="text" name="educationRequired" placeholder="e.g. Bachelor's in CS or equivalent"
                        th:value="*{educationRequired}" />
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Target Experience</label>
                        <input type="text" name="experienceRequired" placeholder="e.g. 5+ Years"
                            th:value="*{experienceRequired}" />
                    </div>

                    <div class="form-group">
                        <label>Available Vacancies</label>
                        <input type="number" name="numberOfOpenings" min="1" th:value="*{numberOfOpenings ?: 1}" />
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Min Salary (₹ Annual)</label>
                        <input type="number" name="salaryMin" placeholder="500000" min="0" step="50000"
                            th:value="*{salaryMin}" />
                    </div>

                    <div class="form-group">
                        <label>Max Salary (₹ Annual)</label>
                        <input type="number" name="salaryMax" placeholder="1500000" min="0" step="50000"
                            th:value="*{salaryMax}" />
                    </div>
                </div>

                <div class="form-group" style="max-width: 400px;">
                    <label>Application Deadline</label>
                    <input type="datetime-local" name="deadline" th:value="*{deadline}" />
                    <div class="hint">Candidates cannot apply after this date</div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-submit">🚀 Publish Job</button>
                    <a href="/employer/dashboard" class="btn btn-cancel">Cancel</a>
                </div>

            </form>
        </div>
    </div>

    <footer th:replace="fragments/footer :: footer"></footer>

    <!-- Common Fragments Scripts -->
    <script th:replace="fragments/header :: header-js"></script>

    <script>
        document.getElementById('postJobForm').addEventListener('submit', function (event) {
            let isValid = true;

            // Clear previous errors
            document.querySelectorAll('.client-error').forEach(el => el.textContent = '');

            // Title validation
            const title = document.getElementById('title');
            if (!title.value.trim()) {
                document.getElementById('titleError').textContent = 'Job title is required';
                isValid = false;
            }

            // Description validation
            const description = document.getElementById('description');
            if (!description.value.trim()) {
                document.getElementById('descriptionError').textContent = 'Job description is required';
                isValid = false;
            }

            // Location validation
            const location = document.getElementById('location');
            if (!location.value.trim()) {
                document.getElementById('locationError').textContent = 'Location is required';
                isValid = false;
            }

            // Job Type validation
            const jobType = document.getElementById('jobType');
            if (!jobType.value) {
                document.getElementById('jobTypeError').textContent = 'Please select a job type';
                isValid = false;
            }

            // Skills validation
            const skills = document.getElementById('skillsRequired');
            if (!skills.value.trim()) {
                document.getElementById('skillsRequiredError').textContent = 'Skills are required';
                isValid = false;
            }

            if (!isValid) {
                event.preventDefault();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });
    </script>
</body>

</html>
