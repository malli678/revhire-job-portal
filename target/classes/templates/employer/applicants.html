<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Applicants</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial; padding:40px; background:#f8f9fa; }
        table { width:100%; border-collapse: collapse; background:white; }
        th, td { padding:12px; border-bottom:1px solid #ddd; }
        th { background:#007bff; color:white; }
        button {
            padding:6px 12px;
            border:none;
            border-radius:4px;
            cursor:pointer;
        }
        .shortlist { background:#28a745; color:white; }
        .reject { background:#dc3545; color:white; }
        .save { background:#17a2b8; color:white; }
    </style>
</head>
<body>

<h2>Applicants List</h2>

<table>
    <tr>
        <th>Candidate</th>
        <th>Status</th>
        <th>Applied Date</th>
        <th>Actions</th>
        <th>Notes</th>
    </tr>

    <tr th:each="app : ${applications}">
        <td th:text="${app.jobSeeker.fullName}"></td>
        <td th:text="${app.status}"></td>
        <td th:text="${#temporals.format(app.appliedDate, 'dd-MM-yyyy HH:mm')}"></td>

        <td>
            <form th:action="@{/applications/shortlist}" method="post" style="display:inline;">
                <input type="hidden" name="applicationId" th:value="${app.id}" />
                <input type="hidden" name="jobId" th:value="${jobId}" />
                <button class="shortlist">Shortlist</button>
            </form>

            <form th:action="@{/applications/reject}" method="post" style="display:inline;">
                <input type="hidden" name="applicationId" th:value="${app.id}" />
                <input type="hidden" name="jobId" th:value="${jobId}" />
                <button class="reject">Reject</button>
            </form>
        </td>

        <td>
            <form th:action="@{/applications/add-notes}" method="post">
                <input type="hidden" name="applicationId" th:value="${app.id}" />
                <input type="hidden" name="jobId" th:value="${jobId}" />
                <input type="text" name="notes"
                       th:value="${app.notes}"
                       placeholder="Add note" />
                <button class="save">Save</button>
            </form>
        </td>
    </tr>
</table>

</body>
</html>
