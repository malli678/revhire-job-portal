<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">

    <!-- ✅ CSRF TOKENS (MANDATORY FOR FETCH) -->
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>

    <title>Job Details</title>

    <style>
        body {
            font-family:'Segoe UI', Arial, sans-serif;
            background:#f5f6fa;
            padding:30px;
        }
		.alert {
		    margin-top: 15px;
		    padding: 12px;
		    border-radius: 10px;
		    font-size: 14px;
		    font-weight: 500;
		}

		.alert.success {
		    background: #f0fff4;
		    color: #2f855a;
		    border-left: 4px solid #38a169;
		}

		.alert.error {
		    background: #fff5f5;
		    color: #c53030;
		    border-left: 4px solid #e53e3e;
		}

        .card{
            background:white;
            padding:25px;
            border-radius:10px;
            max-width:900px;
            margin:auto;
            box-shadow:0 4px 20px rgba(0,0,0,0.05);
        }

        h2{ margin-bottom:10px; }

        .company{
            color:#667eea;
            font-weight:bold;
            margin-bottom:10px;
        }

        .info{ margin-bottom:10px; }

        .btn{
            background:#667eea;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:6px;
            cursor:pointer;
            margin-right:10px;
        }
	

		.applied-btn {
		    background: gray !important;
		    cursor: not-allowed;
		}

		
        .btn.apply{ background:#28a745; }
        .btn.back{ background:#6c757d; text-decoration:none; padding:10px 18px; }
    </style>
</head>

<body>

<div class="card">

    <h2 th:text="${job.title}">Job Title</h2>

    <div class="company"
         th:text="${job.employer.companyName}">
    </div>
	<div class="company">
	    <span th:text="${job.employer.companyName}"></span>
	    <a th:href="@{'/employer/public/' + ${job.employer.userId}}" 
	       style="font-size: 13px; margin-left: 10px; color: #667eea;">
	        View Company Profile →
	    </a>
	</div>

    <div class="info">
        📍 <span th:text="${job.location}">Location</span>
    </div>

    <div class="info">
        💰 ₹<span th:text="${job.salaryMin}">0</span>
        -
        ₹<span th:text="${job.salaryMax}">0</span>
    </div>

    <hr>

	<p th:text="${job.description}">
	    Job Description...
	</p>
	<div id="messageBox" style="display:none;"></div>
	<!-- ✅ SUCCESS MESSAGE -->
	<div th:if="${successMsg}" class="alert success">
	    <span th:text="${successMsg}"></span>
	</div>

	<!-- ❌ ERROR MESSAGE -->
	<div th:if="${errorMsg}" class="alert error">
	    <span th:text="${errorMsg}"></span>
	</div>

    <br>

    <!-- ✅ BUTTONS -->
	<a th:href="@{/applications/apply/{jobId}(jobId=${job.jobId})}">
		<button class="btn apply"
		        th:if="${!alreadyApplied}"
		        th:attr="onclick=|applyJob(${job.jobId})|">
		    Apply Job
		</button>

		<button class="btn apply applied-btn"
		        th:if="${alreadyApplied}"
		        disabled>
		    Applied ✅
		</button>
	</a>

    <button class="btn"
            th:attr="onclick=|saveJob(${job.jobId})|">
        Save Job
    </button>

    <a th:href="@{/jobseeker/search-jobs}"
       class="btn back">
        Back
    </a>

</div>

<script>

    // ✅ COMMON CSRF FETCH CONFIG ⭐⭐⭐
    function getCsrfHeaders() {

        const token = document.querySelector("meta[name='_csrf']").content;
        const header = document.querySelector("meta[name='_csrf_header']").content;

        return { [header]: token };
    }

	// ✅ SAVE JOB
	    function saveJob(jobId) {

	        fetch('/jobseeker/saveJob/' + jobId, {
	            method: 'POST',
	            headers: getCsrfHeaders(),
	            credentials: 'same-origin'
	        })
	        .then(async response => {

	            const message = await response.text();

	        })
	        .catch(err => {

</body>
</html>
