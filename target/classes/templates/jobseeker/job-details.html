<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Job Details - RevHire</title>
    <meta charset="UTF-8">

    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />

    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f2f5;
            color: #1a202c;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .main-card {
            background: white;
            border-radius: 20px;
            padding: 45px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
        }

        .job-title {
            font-size: 2.2rem;
            font-weight: 800;
            color: #1e293b;
            margin: 0;
        }

        .company-meta {
            margin-top: 10px;
            font-size: 1.2rem;
            color: #4F46E5;
            font-weight: 700;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
            gap: 20px;
            margin: 35px 0;
            padding: 25px;
            background: #f8fafc;
            border-radius: 16px;
            border: 1px solid #edf2f7;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .info-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #94a3b8;
            font-weight: 800;
        }

        .info-value {
            font-size: 1.05rem;
            font-weight: 700;
            color: #334155;
        }

        .description-area {
            line-height: 1.8;
            color: #475569;
            font-size: 1.05rem;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 800;
            color: #1e293b;
            margin: 40px 0 20px 0;
        }

        .btn {
            padding: 14px 32px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            border: none;
        }

        .btn-apply {
            background: #4F46E5;
            color: white;
        }

        .btn-apply:hover {
            background: #4338ca;
        }

        .btn-save {
            background: #f1f5f9;
            color: #475569;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            z-index: 10000;
        }
    </style>

    <style th:replace="fragments/header :: header-css"></style>
    <style th:replace="fragments/footer :: footer-css"></style>
</head>

<body>

<div th:replace="fragments/header :: header"></div>

<div class="container">
<div class="main-card">

<div class="header-row">
<div>
<h1 class="job-title" th:text="${job.title}"></h1>
<div class="company-meta"
     th:text="${job.employer != null ? job.employer.companyName : 'Organization'}">
</div>
</div>
</div>

<div class="info-grid">

<div class="info-item">
<span class="info-label">Location</span>
<span class="info-value" th:text="${job.location}"></span>
</div>

<div class="info-item">
<span class="info-label">Salary</span>
<span class="info-value">
<th:block th:if="${job.salaryMin != null and job.salaryMax != null}">
₹<span th:text="${job.salaryMin}"></span> -
₹<span th:text="${job.salaryMax}"></span>
</th:block>
<th:block th:unless="${job.salaryMin != null and job.salaryMax != null}">
Competitive
</th:block>
</span>
</div>

<div class="info-item">
<span class="info-label">Experience</span>
<span class="info-value"
      th:text="${job.experienceRequired ?: 'Fresher'}">
</span>
</div>

</div>

<div class="description-area">

<h3 class="section-title">Job Description</h3>
<p th:text="${job.description}" style="white-space:pre-line;"></p>

<th:block th:if="${job.skillsRequired != null}">
<h3 class="section-title">Skills Required</h3>
<p th:text="${job.skillsRequired}"></p>
</th:block>

<th:block th:if="${job.educationRequired != null}">
<h3 class="section-title">Education Required</h3>
<p th:text="${job.educationRequired}"></p>
</th:block>

</div>

<div style="margin-top:40px; display:flex; gap:10px;">

<form th:action="@{/jobseeker/applyJob/{jobId}(jobId=${job.jobId})}"
      method="post"
      enctype="multipart/form-data">

<input type="hidden"
       th:name="${_csrf.parameterName}"
       th:value="${_csrf.token}" />

<input type="file"
       name="resume"
       required
       accept=".pdf,.doc,.docx"
       style="margin-bottom:10px;">

<br>

<textarea name="coverLetter"
          rows="4"
          placeholder="Optional cover letter"
          style="width:100%; padding:10px;"></textarea>

<br><br>

<button type="submit" class="btn btn-apply">
Apply Job
</button>

</form>

<button class="btn btn-save"
        th:onclick="'saveJob(' + ${job.jobId} + ')'">
Save Job
</button>

</div>

</div>
</div>

<footer th:replace="fragments/footer :: footer"></footer>
<script th:replace="fragments/header :: header-js"></script>

<script th:inline="javascript">

const csrfToken = document.querySelector('meta[name="_csrf"]').content;
const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

function notify(msg, err=false){
const div=document.createElement('div');
div.className='notification';
div.style.background=err?'#ef4444':'#10b981';
div.textContent=msg;
document.body.appendChild(div);
setTimeout(()=>div.remove(),3000);
}

async function saveJob(id){
try{
const res=await fetch('/jobseeker/saveJob/'+id,{
method:'POST',
headers:{[csrfHeader]:csrfToken}
});
const msg=await res.text();
notify(msg);
}catch(e){
notify('Save failed',true);
}
}

</script>

</body>
</html>
