<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Job Details</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial; padding: 40px; background:#f4f6f9; }
        .container { background:white; padding:30px; border-radius:10px; box-shadow:0 0 10px #ddd; }
        h2 { margin-bottom:10px; }
        .info { margin-bottom:15px; }
        .btn {
            padding:10px 18px;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-weight:bold;
        }
        .apply { background:#28a745; color:white; }
        .back { background:#6c757d; color:white; }
    </style>
</head>
<body>

<div class="container">
    <h2 th:text="${job.title}">Job Title</h2>

    <div class="info"><b>Company:</b>
        <span th:text="${job.employer.companyName}"></span>
    </div>

    <div class="info"><b>Location:</b>
        <span th:text="${job.location}"></span>
    </div>

	<div class="info"><b>Salary:</b>
	    ₹<span th:text="${job.salaryMin}"></span>
	    -
	    ₹<span th:text="${job.salaryMax}"></span>
	</div>

    <div class="info"><b>Description:</b>
        <p th:text="${job.description}"></p>
    </div>

	<button class="btn apply"
	        th:onclick="'applyJob(' + ${job.jobId} + ')'">
	    Apply Job
    </button>

    <a th:href="@{/jobseeker/search-jobs}">
        <button class="btn back">Back</button>
    </a>
</div>

<script>
function applyJob(jobId) {
    fetch('/jobseeker/applyJob/' + jobId, {
        method: 'POST'
    })
    .then(response => {
        if(response.ok){
            alert("Application Submitted Successfully!");
            window.location.href="/jobseeker/applications";
        } else {
            alert("Already Applied or Error Occurred");
        }
    })
    .catch(() => alert("Something went wrong"));
}
</script>

</body>
</html>
