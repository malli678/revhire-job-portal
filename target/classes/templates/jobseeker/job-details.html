<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">

    <!-- ✅ CSRF TOKENS (MANDATORY FOR FETCH) -->
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>

    <title>Job Details</title>

    <style>
        body {
            font-family:'Segoe UI', Arial, sans-serif;
            background:#f5f6fa;
            padding:30px;
        }

        .card{
            background:white;
            padding:25px;
            border-radius:10px;
            max-width:900px;
            margin:auto;
            box-shadow:0 4px 20px rgba(0,0,0,0.05);
        }

        h2{ margin-bottom:10px; }

        .company{
            color:#667eea;
            font-weight:bold;
            margin-bottom:10px;
        }

        .info{ margin-bottom:10px; }

        .btn{
            background:#667eea;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:6px;
            cursor:pointer;
            margin-right:10px;
        }

        .btn.apply{ background:#28a745; }
        .btn.back{ background:#6c757d; text-decoration:none; padding:10px 18px; }
    </style>
</head>

<body>

<div class="card">

    <h2 th:text="${job.title}">Job Title</h2>

    <div class="company"
         th:text="${job.employer.companyName}">
    </div>

    <div class="info">
        📍 <span th:text="${job.location}">Location</span>
    </div>

    <div class="info">
        💰 ₹<span th:text="${job.salaryMin}">0</span>
        -
        ₹<span th:text="${job.salaryMax}">0</span>
    </div>

    <hr>

    <p th:text="${job.description}">
        Job Description...
    </p>

    <br>

    <!-- ✅ BUTTONS -->
    <button class="btn apply"
            th:attr="onclick=|applyJob(${job.jobId})|">
        Apply Job
    </button>

    <button class="btn"
            th:attr="onclick=|saveJob(${job.jobId})|">
        Save Job
    </button>

    <a th:href="@{/jobseeker/search-jobs}"
       class="btn back">
        Back
    </a>

</div>

<script>

    // ✅ COMMON CSRF FETCH CONFIG ⭐⭐⭐
    function getCsrfHeaders() {

        const token = document.querySelector("meta[name='_csrf']").content;
        const header = document.querySelector("meta[name='_csrf_header']").content;

        return { [header]: token };
    }

    // ✅ APPLY JOB (FULLY FIXED)
    function applyJob(jobId) {

        fetch('/jobseeker/applyJob/' + jobId, {
            method: 'POST',
            headers: getCsrfHeaders(),   // ⭐⭐⭐ CRITICAL FIX
            credentials: 'same-origin'
        })
        .then(async response => {

            const message = await response.text();

            if (response.ok) {

                alert(message || "Application Submitted Successfully!");
                window.location.href = "/jobseeker/applications";

            } else {

                alert(message || "Application Failed");
            }
        })
        .catch(err => {

            console.error(err);
            alert("Network Error");
        });
    }

    // ✅ SAVE JOB
    function saveJob(jobId) {

        fetch('/jobseeker/saveJob/' + jobId, {
            method: 'POST',
            headers: getCsrfHeaders(),
            credentials: 'same-origin'
        })
        .then(async response => {

            const message = await response.text();
            alert(message);
        })
        .catch(err => {

            console.error(err);
            alert("Save Job Failed");
        });
    }

</script>

</body>
</html>
