<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Apply Job</title>

    <style>
        body {
            font-family: 'Segoe UI';
            background: #f4f6f9;
            padding: 40px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 14px;
            width: 420px;
            box-shadow: 0 5px 18px rgba(0,0,0,0.08);
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 6px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ddd;
        }

        button {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            width: 100%;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="card">

    <h2>📄 Apply for Job</h2>

    <form th:action="@{/applications/submit}"
          method="post"
          enctype="multipart/form-data">

        <input type="hidden" name="jobId" th:value="${job.jobId}" />

        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}" />

        <label>Upload Resume</label>
        <input type="file" name="resume" required />

        <label>Cover Letter (Optional)</label>
        <textarea name="coverLetter"></textarea>

        <button type="submit">Submit Application</button>

    </form>

</div>

</body>
</html>
