<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Saved Jobs</title>
    <style>
        body { font-family:'Segoe UI'; background:#f5f6fa; padding:30px; }

        .job-card {
            background:white;
            padding:20px;
            border-radius:10px;
            margin-bottom:15px;
            box-shadow:0 4px 15px rgba(0,0,0,0.05);
        }

        .company { color:#667eea; font-weight:bold; }
    </style>
</head>
<body>

<h2>⭐ Saved Jobs</h2>

<div th:each="saved : ${savedJobs}" class="job-card">

    <h3 th:text="${saved.job.title}"></h3>

    <div class="company" th:text="${saved.job.employer.companyName}"></div>

    <p>📍 <span th:text="${saved.job.location}"></span></p>

</div>

</body>
</html>
