<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Applications</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial; padding:40px; background:#f4f6f9; }
        table { width:100%; border-collapse: collapse; background:white; }
        th, td { padding:12px; border-bottom:1px solid #ddd; text-align:left; }
        th { background:#343a40; color:white; }

        .status-APPLIED { color:blue; font-weight:bold; }
        .status-SHORTLISTED { color:green; font-weight:bold; }
        .status-REJECTED { color:red; font-weight:bold; }
        .status-WITHDRAWN { color:orange; font-weight:bold; }

        .withdraw-btn {
            background:#dc3545;
            color:white;
            border:none;
            padding:6px 10px;
            border-radius:4px;
            cursor:pointer;
        }
    </style>
</head>
<body>

<h2>My Applications</h2>

<table>
    <tr>
        <th>Job Title</th>
        <th>Company</th>
        <th>Status</th>
        <th>Applied Date</th>
        <th>Action</th> <!-- NEW COLUMN -->
    </tr>

    <tr th:each="app : ${applications}">
        <td th:text="${app.job.title}"></td>
        <td th:text="${app.job.employer.companyName}"></td>

        <td th:text="${app.status}"
            th:class="'status-' + ${app.status}">
        </td>

        <td th:text="${#temporals.format(app.appliedDate, 'dd-MM-yyyy HH:mm')}"></td>

        <!-- Withdraw button inside loop -->
        <td>
            <form th:action="@{/jobseeker/withdraw/{id}(id=${app.id})}"
                  method="post"
                  th:if="${app.status == T(com.revhire.model.Application.ApplicationStatus).APPLIED}">

                <!-- CSRF token -->
                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}" />

                <input type="text"
                       name="notes"
                       placeholder="Reason"
                       required
                       style="width:120px;" />

                <button type="submit" class="withdraw-btn">
                    Withdraw
                </button>
            </form>
        </td>
    </tr>

</table>

</body>
</html>
