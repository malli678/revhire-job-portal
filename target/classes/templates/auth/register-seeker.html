<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register as Job Seeker - RevHire</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .form-row {
            display: flex;
            gap: 15px;
        }
        .form-group {
            margin-bottom: 20px;
            flex: 1;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e1e1;
            border-radius: 6px;
            font-size: 15px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .error {
            color: red;
            font-size: 14px;
            margin-top: 5px;
        }
        .alert-error {
            background: #fee;
            color: #c00;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid #fcc;
        }
        .alert-success {
            background: #efe;
            color: #060;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid #cfc;
        }
        .links {
            text-align: center;
            margin-top: 20px;
        }
        .links a {
            color: #667eea;
            text-decoration: none;
        }
        .login-link {
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Create Job Seeker Account</h2>
        <p class="subtitle">Find your dream job with RevHire</p>
        
        <div th:if="${error}" class="alert-error" th:text="${error}"></div>
        <div th:if="${success}" class="alert-success" th:text="${success}"></div>
        
        <form th:action="@{/auth/register/seeker}" th:object="${registrationDto}" method="post">
            <div class="form-row">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" th:field="*{fullName}" placeholder="Enter your full name" required>
                    <span th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" class="error"></span>
                </div>
                
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" th:field="*{email}" placeholder="Enter your email" required>
                    <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error"></span>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Password *</label>
                    <input type="password" th:field="*{password}" placeholder="Create password" required minlength="6">
                    <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="error"></span>
                </div>
                
                <div class="form-group">
                    <label>Confirm Password *</label>
                    <input type="password" th:field="*{confirmPassword}" placeholder="Confirm password" required>
                    <span th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}" class="error"></span>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" th:field="*{phoneNumber}" placeholder="Enter phone number">
                </div>
                
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" th:field="*{location}" placeholder="City, Country">
                </div>
            </div>
            
            <div class="form-group">
                <label>Current Employment Status</label>
                <select th:field="*{currentEmploymentStatus}">
                    <option value="">Select status</option>
                    <option value="Employed">Employed</option>
                    <option value="Unemployed">Unemployed</option>
                    <option value="Student">Student</option>
                    <option value="Fresher">Fresher</option>
                </select>
            </div>
            
            <button type="submit">Register as Job Seeker</button>
        </form>
        
        <div class="login-link">
            Already have an account? <a th:href="@{/auth/login}">Login here</a>
        </div>
    </div>
</body>
</html>
