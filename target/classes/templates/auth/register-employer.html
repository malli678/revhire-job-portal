<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register as Employer - RevHire</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-group {
            flex: 1;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e1e1;
            border-radius: 6px;
            font-size: 15px;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #11998e;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(17, 153, 142, 0.4);
        }

        .error {
            color: #dc3545;
            font-size: 12px;
            margin-top: 5px;
            display: block;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid #c3e6cb;
        }

        .login-link {
            margin-top: 15px;
            text-align: center;
        }

        .login-link a {
            color: #11998e;
            text-decoration: none;
        }

        .hint {
            font-size: 11px;
            color: #6c757d;
            margin-top: 5px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Register Your Company</h2>
        <p class="subtitle">Post jobs and find the best talent</p>

        <!-- Success/Error Messages -->
        <div th:if="${error}" class="alert-error" th:text="${error}"></div>
        <div th:if="${success}" class="alert-success" th:text="${success}"></div>

        <form th:action="@{/auth/register/employer}" th:object="${registrationDto}" method="post" id="registrationForm"
            novalidate>

            <!-- Full Name and Email -->
            <div class="form-row">
                <div class="form-group">
                    <label>Your Name *</label>
                    <input type="text" th:field="*{fullName}" placeholder="Your full name" required>
                    <span class="error client-error" id="fullNameError"></span>
                    <span th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" class="error"></span>
                </div>

                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" th:field="*{email}" placeholder="Your email" required>
                    <span class="error client-error" id="emailError"></span>
                    <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error"></span>
                </div>
            </div>

            <!-- Password and Confirm Password -->
            <div class="form-row">
                <div class="form-group">
                    <label>Password *</label>
                    <input type="password" th:field="*{password}" placeholder="Create password" required>
                    <div class="hint">8-20 chars, with uppercase, lowercase, number & special character</div>
                    <span class="error client-error" id="passwordError"></span>
                    <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="error"></span>
                </div>

                <div class="form-group">
                    <label>Confirm Password *</label>
                    <input type="password" th:field="*{confirmPassword}" placeholder="Confirm password" required>
                    <span class="error client-error" id="confirmPasswordError"></span>
                    <span th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"
                        class="error"></span>
                </div>
            </div>

            <!-- Company Name -->
            <div class="form-group">
                <label>Company Name *</label>
                <input type="text" th:field="*{companyName}" placeholder="Your company name" required>
                <span class="error client-error" id="companyNameError"></span>
                <span th:if="${#fields.hasErrors('companyName')}" th:errors="*{companyName}" class="error"></span>
            </div>

            <!-- Industry and Company Size -->
            <div class="form-row">
                <div class="form-group">
                    <label>Industry *</label>
                    <select th:field="*{industry}" id="industry" required>
                        <option value="">Select industry</option>
                        <option value="IT">Information Technology</option>
                        <option value="Finance">Finance & Banking</option>
                        <option value="Healthcare">Healthcare</option>
                        <option value="Education">Education</option>
                        <option value="Retail">Retail & E-commerce</option>
                        <option value="Manufacturing">Manufacturing</option>
                        <option value="Marketing">Marketing & Advertising</option>
                        <option value="Other">Other</option>
                    </select>
                    <span class="error client-error" id="industryError"></span>
                    <span th:if="${#fields.hasErrors('industry')}" th:errors="*{industry}" class="error"></span>
                </div>

                <div class="form-group">
                    <label>Company Size *</label>
                    <select th:field="*{companySize}" id="companySize" required>
                        <option value="">Select size</option>
                        <option value="1-10">1-10 employees</option>
                        <option value="11-50">11-50 employees</option>
                        <option value="51-200">51-200 employees</option>
                        <option value="201-500">201-500 employees</option>
                        <option value="500+">500+ employees</option>
                    </select>
                    <span class="error client-error" id="companySizeError"></span>
                    <span th:if="${#fields.hasErrors('companySize')}" th:errors="*{companySize}" class="error"></span>
                </div>
            </div>

            <!-- Company Website (Optional) -->
            <div class="form-group">
                <label>Company Website</label>
                <input type="text" th:field="*{companyWebsite}" placeholder="e.g., amazon.com or https://amazon.com">
                <div class="hint">Optional - Enter your company website</div>
                <span th:if="${#fields.hasErrors('companyWebsite')}" th:errors="*{companyWebsite}" class="error"></span>
            </div>

            <!-- Company Description (NEW - Optional) -->
            <div class="form-group">
                <label>Company Description</label>
                <textarea th:field="*{companyDescription}" placeholder="Tell us about your company..."></textarea>
                <div class="hint">Optional - Brief description of your company</div>
                <span th:if="${#fields.hasErrors('companyDescription')}" th:errors="*{companyDescription}"
                    class="error"></span>
            </div>

            <!-- Security Question and Answer -->
            <div class="form-row">
                <div class="form-group">
                    <label>Security Question *</label>
                    <select th:field="*{securityQuestion}" id="securityQuestion" required>
                        <option value="What is your favorite color?" selected>What is your favorite color?</option>
                        <option value="What is your mother's maiden name?">What is your mother's maiden name?</option>
                        <option value="What was the name of your first pet?">What was the name of your first pet?
                        </option>
                        <option value="What city were you born in?">What city were you born in?</option>
                    </select>
                    <span class="error client-error" id="securityQuestionError"></span>
                    <span th:if="${#fields.hasErrors('securityQuestion')}" th:errors="*{securityQuestion}"
                        class="error"></span>
                </div>

                <div class="form-group">
                    <label>Security Answer *</label>
                    <input type="text" th:field="*{securityAnswer}" placeholder="Your answer" required>
                    <span class="error client-error" id="securityAnswerError"></span>
                    <span th:if="${#fields.hasErrors('securityAnswer')}" th:errors="*{securityAnswer}"
                        class="error"></span>
                </div>
            </div>

            <!-- Headquarters -->
            <div class="form-group">
                <label>Headquarters Location *</label>
                <input type="text" th:field="*{headquarters}" placeholder="City, Country" required>
                <span class="error client-error" id="headquartersError"></span>
                <span th:if="${#fields.hasErrors('headquarters')}" th:errors="*{headquarters}" class="error"></span>
            </div>

            <button type="submit">Register Company</button>
        </form>

        <div class="login-link">
            Already have an account? <a th:href="@{/auth/login}">Login here</a>
        </div>
    </div>

    <script>
        document.getElementById('registrationForm').addEventListener('submit', function (event) {
            let isValid = true;

            // Clear previous client-side errors
            document.querySelectorAll('.client-error').forEach(el => el.textContent = '');

            // Helper to set error
            const setError = (id, message) => {
                document.getElementById(id).textContent = message;
                isValid = false;
            };

            // Full Name validation
            const fullName = document.getElementById('fullName');
            if (!fullName.value.trim()) setError('fullNameError', 'Your name is required');

            // Email validation
            const email = document.getElementById('email');
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!email.value.trim()) {
                setError('emailError', 'Email is required');
            } else if (!emailPattern.test(email.value)) {
                setError('emailError', 'Invalid email format');
            }

            // Password validation
            const password = document.getElementById('password');
            if (!password.value) {
                setError('passwordError', 'Password is required');
            } else if (password.value.length < 8) {
                setError('passwordError', 'Min 8 characters');
            }

            // Confirm Password validation
            const confirmPassword = document.getElementById('confirmPassword');
            if (confirmPassword.value !== password.value) {
                setError('confirmPasswordError', 'Passwords do not match');
            }

            // Company Name
            const companyName = document.getElementById('companyName');
            if (!companyName.value.trim()) setError('companyNameError', 'Company name is required');

            // Industry
            if (!document.getElementById('industry').value) setError('industryError', 'Please select industry');

            // Company Size
            if (!document.getElementById('companySize').value) setError('companySizeError', 'Please select company size');

            // Security Answer
            if (!document.getElementById('securityAnswer').value.trim()) setError('securityAnswerError', 'Security answer is required');

            // Headquarters
            if (!document.getElementById('headquarters').value.trim()) setError('headquartersError', 'Headquarters is required');

            if (!isValid) {
                event.preventDefault();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });
    </script>
</body>

</html>
