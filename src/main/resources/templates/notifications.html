<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Notifications - RevHire</title>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7fa;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #2d3748;
            font-size: 28px;
            font-weight: 700;
        }

        .notification-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 4px solid transparent;
        }

        .notification-card.unread {
            border-left-color: #4F46E5;
            background: #f9faff;
        }

        .notification-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }

        .notification-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .notification-title {
            font-size: 18px;
            font-weight: 700;
            color: #1a202c;
        }

        .notification-type {
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 20px;
            background: #e2e8f0;
            color: #4a5568;
            font-weight: 700;
            text-transform: uppercase;
        }

        .notification-type.APPLICATION_UPDATE {
            background: #e0e7ff;
            color: #4338ca;
        }

        .notification-type.JOB_RECOMMENDATION {
            background: #dcfce7;
            color: #166534;
        }

        .notification-message {
            color: #4a5568;
            line-height: 1.6;
            margin-bottom: 15px;
            font-size: 0.95rem;
        }

        .notification-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: #718096;
            padding-top: 15px;
            border-top: 1px solid #f0f2f5;
        }

        .notification-link {
            background: #4F46E5;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .notification-link:hover {
            background: #4338ca;
        }

        .mark-read {
            background: #edf2f7;
            border: none;
            color: #4a5568;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .mark-read:hover {
            background: #e2e8f0;
            color: #2d3748;
        }

        .empty-state {
            text-align: center;
            background: white;
            padding: 60px 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .empty-state h3 {
            color: #2d3748;
            margin-bottom: 10px;
            font-size: 1.5rem;
        }

        .empty-state p {
            color: #718096;
            margin-bottom: 25px;
        }

        .mark-all-read {
            background: white;
            color: #4F46E5;
            border: 1px solid #4F46E5;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 20px;
        }

        .mark-all-read:hover {
            background: #f9faff;
            transform: translateY(-1px);
        }

        .unread-badge {
            background: #f56565;
            color: white;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            margin-left: 10px;
            font-weight: 800;
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
                transform: translateY(0);
            }

            to {
                opacity: 0;
                transform: translateY(-10px);
            }
        }

        .fade-out {
            animation: fadeOut 0.3s ease forwards;
        }

        .btn-delete {
            background: #fff5f5;
            color: #e53e3e;
            border: 1px solid #feb2b2;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            margin-left: 8px;
            transition: all 0.2s;
        }

        .btn-delete:hover {
            background: #c53030;
            color: white;
            border-color: #c53030;
        }
    </style>
    <!-- Common Fragments Styles -->
    <style th:replace="fragments/header :: header-css"></style>
    <style th:replace="fragments/footer :: footer-css"></style>
</head>

<body>

    <div th:replace="fragments/header :: header"></div>

    <div class="container">
        <div class="header">
            <div style="display: flex; align-items: center; gap: 15px;">
                <button onclick="history.back()" class="mark-read"
                    style="padding: 8px 12px; font-size: 1.2rem;">←</button>
                <h1>Notifications <span th:if="${unreadCount > 0}" class="unread-badge" th:text="${unreadCount}"></span>
                </h1>
            </div>
        </div>

        <div th:if="${unreadCount > 0}" style="text-align: right; margin-bottom: 20px;">
            <button class="mark-all-read" onclick="markAllAsRead()">
                ✓ Mark All as Read
            </button>
        </div>

        <div th:if="${#lists.isEmpty(notifications)}" class="empty-state">
            <div style="font-size: 3rem; margin-bottom: 10px;">🎉</div>
            <h3>You're all caught up!</h3>
            <p>No new notifications at the moment. Check back later for updates.</p>
        </div>

        <div th:each="notif : ${notifications}" th:class="'notification-card ' + (${notif.read} ? '' : 'unread')"
            th:id="'notif-' + ${notif.notificationId}">

            <div class="notification-header">
                <span class="notification-title" th:text="${notif.title}"></span>
                <span th:class="'notification-type ' + ${notif.notificationType}"
                    th:text="${notif.notificationType.replace('_', ' ')}"></span>
            </div>

            <div class="notification-message" th:text="${notif.message}"></div>

            <div class="notification-footer">
                <span th:text="${#temporals.format(notif.createdAt, 'dd MMM yyyy, HH:mm')}"></span>

                <div style="display: flex; align-items: center; gap: 8px;">
                    <a th:if="${notif.link != null}" th:href="@{${notif.link}}" class="notification-link">
                        View Details →
                    </a>

                    <button th:if="${!notif.read}" class="mark-read"
                        th:onclick="'markAsRead(' + ${notif.notificationId} + ')'">
                        ✓ Mark as Read
                    </button>

                    <button class="btn-delete" th:onclick="'deleteNotification(' + ${notif.notificationId} + ')'">
                        🗑️ Delete
                    </button>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="fragments/footer :: footer"></footer>

    <!-- Common Fragments Scripts -->
    <script th:replace="fragments/header :: header-js"></script>

    <script>
        const csrfToken = document.querySelector('meta[name="_csrf"]').content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

        function markAsRead(id) {
            fetch('/notifications/' + id + '/read', {
                method: 'POST',
                headers: {
                    [csrfHeader]: csrfToken
                }
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        const notif = document.getElementById('notif-' + id);
                        notif.classList.remove('unread');

                        const badge = document.querySelector('.unread-badge');
                        if (badge) {
                            let count = parseInt(badge.innerText) - 1;
                            if (count > 0) {
                                badge.innerText = count;
                            } else {
                                badge.remove();
                            }
                        }

                        const button = notif.querySelector('.mark-read');
                        if (button) button.remove();

                        // Also update header badge if global update function exists
                        if (typeof updateHeaderBadge === 'function') updateHeaderBadge();
                    }
                })
                .catch(err => console.error(err));
        }

        function markAllAsRead() {
            fetch('/notifications/read-all', {
                method: 'POST',
                headers: {
                    [csrfHeader]: csrfToken
                }
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        document.querySelectorAll('.notification-card.unread').forEach(el => {
                            el.classList.remove('unread');
                            const btn = el.querySelector('.mark-read');
                            if (btn) btn.remove();
                        });

                        const badge = document.querySelector('.unread-badge');
                        if (badge) badge.remove();

                        const markAllBtn = document.querySelector('.mark-all-read');
                        if (markAllBtn) markAllBtn.remove();

                        if (typeof updateHeaderBadge === 'function') updateHeaderBadge();
                    }
                })
                .catch(err => console.error(err));
        }

        function deleteNotification(id) {
            if (!confirm('Are you sure you want to delete this notification?')) return;

            fetch('/notifications/' + id, {
                method: 'DELETE',
                headers: {
                    [csrfHeader]: csrfToken
                }
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        const notif = document.getElementById('notif-' + id);

                        if (notif.classList.contains('unread')) {
                            const badge = document.querySelector('.unread-badge');
                            if (badge) {
                                let count = parseInt(badge.innerText) - 1;
                                if (count > 0) {
                                    badge.innerText = count;
                                } else {
                                    badge.remove();
                                }
                            }
                        }

                        notif.classList.add('fade-out');
                        setTimeout(() => {
                            notif.remove();
                            if (document.querySelectorAll('.notification-card').length === 0) {
                                location.reload();
                            }
                            if (typeof updateHeaderBadge === 'function') updateHeaderBadge();
                        }, 300);
                    }
                })
                .catch(err => console.error(err));
        }
    </script>
</body>

</html>
