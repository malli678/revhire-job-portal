<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Create Job Alert - RevHire</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Common Fragments Styles -->
    <style th:replace="~{fragments/header :: header-css}"></style>
    <style th:replace="~{fragments/footer :: footer-css}"></style>
</head>

<body class="bg-light">

    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container py-5" style="max-width: 600px; min-height: 80vh;">
        <div class="mb-4">
            <a th:href="@{/jobseeker/alerts}" class="btn btn-light fw-bold text-secondary border px-3 py-2 rounded-3 text-decoration-none">
                <i class="bi bi-arrow-left"></i> Back to Job Alerts
            </a>
        </div>

        <div class="card border-0 shadow-sm rounded-4 overlay-hidden">
            <div class="card-header bg-white border-bottom p-4">
                <h2 class="h4 fw-bold text-dark m-0 d-flex align-items-center gap-2">
                    <i class="bi bi-bell-fill text-primary"></i> Create Job Alert
                </h2>
            </div>
            
            <div class="card-body p-4 p-md-5">
                <form th:action="@{/jobseeker/alerts/create}" method="post" th:object="${alert}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold text-secondary small text-uppercase tracking-wider">Alert Name <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{alertName}" class="form-control form-control-lg bg-light" placeholder="e.g. Java Developer in Chennai" required>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold text-secondary small text-uppercase tracking-wider">Keywords <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{keywords}" class="form-control form-control-lg bg-light" placeholder="e.g. Java, Spring, React" required>
                        <div class="form-text mt-2"><i class="bi bi-info-circle"></i> Separate multiple keywords with commas</div>
                    </div>
                    
                    <div class="row g-4 mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold text-secondary small text-uppercase tracking-wider">Location</label>
                            <input type="text" th:field="*{location}" class="form-control form-control-lg bg-light" placeholder="e.g. Chennai, Bangalore">
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label fw-bold text-secondary small text-uppercase tracking-wider">Job Type</label>
                            <select th:field="*{jobType}" class="form-select form-select-lg bg-light">
                                <option value="">Any</option>
                                <option value="Full-time">Full-time</option>
                                <option value="Part-time">Part-time</option>
                                <option value="Contract">Contract</option>
                                <option value="Internship">Internship</option>
                                <option value="Remote">Remote</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="row g-4 mb-5">
                        <div class="col-md-6">
                            <label class="form-label fw-bold text-secondary small text-uppercase tracking-wider">Minimum Salary (₹)</label>
                            <input type="number" th:field="*{minSalary}" class="form-control form-control-lg bg-light" placeholder="e.g. 500000" step="50000">
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label fw-bold text-secondary small text-uppercase tracking-wider">Frequency <span class="text-danger">*</span></label>
                            <select th:field="*{frequency}" class="form-select form-select-lg bg-light" required>
                                <option value="DAILY">Daily</option>
                                <option value="WEEKLY">Weekly</option>
                                <option value="INSTANT">Instant</option>
                            </select>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold rounded-3">Create Alert</button>
                </form>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/footer :: footer}"></footer>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <th:block th:insert="~{fragments/header :: header-js}"></th:block>

</body>
</html>
