<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Job Alert - RevHire</title>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 35px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        h2 {
            margin-top: 0;
            margin-bottom: 25px;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e1e1;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-row {
            display: flex;
            gap: 15px;
        }
        
        .form-row .form-group {
            flex: 1;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-link a {
            color: white;
            text-decoration: none;
        }
        
        .hint {
            font-size: 12px;
            color: #718096;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>Create Job Alert</h2>
            
            <form th:action="@{/jobseeker/alerts/create}" method="post" th:object="${alert}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                
                <div class="form-group">
                    <label>Alert Name *</label>
                    <input type="text" th:field="*{alertName}" placeholder="e.g. Java Developer in Chennai" required>
                </div>
                
                <div class="form-group">
                    <label>Keywords *</label>
                    <input type="text" th:field="*{keywords}" 
                           placeholder="e.g. Java, Spring, React (comma separated)" required>
                    <div class="hint">Separate multiple keywords with commas</div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" th:field="*{location}" placeholder="e.g. Chennai, Bangalore">
                    </div>
                    
                    <div class="form-group">
                        <label>Job Type</label>
                        <select th:field="*{jobType}">
                            <option value="">Any</option>
                            <option value="Full-time">Full-time</option>
                            <option value="Part-time">Part-time</option>
                            <option value="Contract">Contract</option>
                            <option value="Internship">Internship</option>
                            <option value="Remote">Remote</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Minimum Salary (₹)</label>
                        <input type="number" th:field="*{minSalary}" placeholder="e.g. 500000" step="50000">
                    </div>
                    
                    <div class="form-group">
                        <label>Frequency *</label>
                        <select th:field="*{frequency}" required>
                            <option value="DAILY">Daily</option>
                            <option value="WEEKLY">Weekly</option>
                            <option value="INSTANT">Instant</option>
                        </select>
                    </div>
                </div>
                
                <button type="submit" class="btn">Create Alert</button>
            </form>
        </div>
        
        <div class="back-link">
            <a th:href="@{/jobseeker/alerts}">← Back to Job Alerts</a>
        </div>
    </div>
</body>
</html>
