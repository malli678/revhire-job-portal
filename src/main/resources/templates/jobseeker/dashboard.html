<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Dashboard - RevHire</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/jobseeker-dashboard.css}" />

    <!-- Common Fragments Styles -->
    <style th:replace="~{fragments/header :: header-css}"></style>
    <style th:replace="~{fragments/footer :: footer-css}"></style>
</head>

<body class="bg-light">

    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container py-5">
        <!-- WELCOME SECTION -->
        <div class="welcome-card mb-5">
            <h1 class="welcome-title" th:text="'Welcome, ' + ${user.fullName.split(' ')[0]} + '!'">Welcome, User!</h1>
            <p class="welcome-text mt-2">You have <span th:text="${applicationCount}" class="fw-bold">0</span> active applications in progress. Let's find your next milestone.</p>
        </div>

        <!-- STATS SECTION -->
        <div class="row g-4 mb-5">
            <div class="col-md-4 col-sm-6">
                <div class="card stat-card h-100 p-4 d-flex flex-row align-items-center gap-3">
                    <div class="stat-icon-wrapper bg-light-primary">
                        <i class="bi bi-file-earmark-text"></i>
                    </div>
                    <div>
                        <h3 class="stat-value" th:text="${applicationCount}">0</h3>
                        <p class="stat-label">Total Apps</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4 col-sm-6">
                <div class="card stat-card h-100 p-4 d-flex flex-row align-items-center gap-3">
                    <div class="stat-icon-wrapper bg-light-warning">
                        <i class="bi bi-bookmark"></i>
                    </div>
                    <div>
                        <h3 class="stat-value" th:text="${savedCount}">0</h3>
                        <p class="stat-label">Saved Jobs</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4 col-sm-12">
                <div class="card stat-card h-100 p-4 d-flex flex-row align-items-center gap-3">
                    <div class="stat-icon-wrapper bg-light-success">
                        <i class="bi bi-lightning-charge"></i>
                    </div>
                    <div class="w-100">
                        <div class="d-flex justify-content-between align-items-baseline mb-2">
                            <h3 class="stat-value" th:text="${completion + '%'}">70%</h3>
                            <p class="stat-label">Profile Strength</p>
                        </div>
                        <div class="progress" style="height: 10px; border-radius: 5px;">
                            <div class="progress-bar bg-success" id="profileStrengthBar" role="progressbar" 
                                 th:style="'width: 0%; transition: width 1s ease-out;'"
                                 th:attr="aria-valuenow=${completion}" aria-valuemin="0" aria-valuemax="100"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- NAVIGATION GRID -->
        <h4 class="mb-4 text-secondary fw-bold">Quick Actions</h4>
        <div class="row g-3">
            <div class="col-xl-3 col-md-4 col-sm-6">
                <a th:href="@{/jobseeker/search-jobs}" class="nav-item-card highlight h-100">
                    <i class="bi bi-search"></i>
                    <span>Search Jobs</span>
                </a>
            </div>
            <div class="col-xl-3 col-md-4 col-sm-6">
                <a th:href="@{/jobseeker/recommendations}" class="nav-item-card h-100">
                    <i class="bi bi-bullseye text-primary"></i>
                    <span>For You</span>
                </a>
            </div>
            <div class="col-xl-3 col-md-4 col-sm-6">
                <a th:href="@{/jobseeker/saved-jobs}" class="nav-item-card h-100">
                    <i class="bi bi-save text-warning"></i>
                    <span>Saved</span>
                </a>
            </div>
            <div class="col-xl-3 col-md-4 col-sm-6">
                <a th:href="@{/jobseeker/applications}" class="nav-item-card h-100">
                    <i class="bi bi-files text-info"></i>
                    <span>My Applications</span>
                </a>
            </div>
            <div class="col-xl-4 col-md-4 col-sm-6">
                <a th:href="@{/jobseeker/profile}" class="nav-item-card h-100">
                    <i class="bi bi-person text-success"></i>
                    <span>Profile</span>
                </a>
            </div>
            <div class="col-xl-4 col-md-4 col-sm-6">
                <a th:href="@{/jobseeker/resume}" class="nav-item-card h-100">
                    <i class="bi bi-file-earmark-pdf text-danger"></i>
                    <span>Resume</span>
                </a>
            </div>
            <div class="col-xl-4 col-md-6 col-sm-12">
                <a th:href="@{/jobseeker/alerts}" class="nav-item-card h-100">
                    <i class="bi bi-bell text-secondary"></i>
                    <span>Alerts</span>
                </a>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/footer :: footer}"></footer>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Common Fragments Scripts -->
    <script th:replace="~{fragments/header :: header-js}"></script>

    <!-- External Dashboard JS -->
    <script th:src="@{/js/jobseeker-dashboard.js}"></script>
</body>

</html>
