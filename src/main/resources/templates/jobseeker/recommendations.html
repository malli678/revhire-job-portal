<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Recommended Jobs - RevHire</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .header h1 {
            color: white;
            font-size: 28px;
        }
        .back-btn {
            background: white;
            color: #667eea;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
        }
        .job-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: 0.2s;
            border-left: 4px solid #667eea;
        }
        .job-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        .job-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        .company {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .match-badge {
            display: inline-block;
            background: #c6f6d5;
            color: #276749;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .job-details {
            display: flex;
            gap: 15px;
            margin: 10px 0;
            color: #718096;
            font-size: 14px;
        }
        .btn {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            margin-top: 10px;
        }
        .empty-state {
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Recommended Jobs For You</h1>
            <a th:href="@{/jobseeker/dashboard}" class="back-btn">← Back to Dashboard</a>
        </div>
        
        <div th:if="${#lists.isEmpty(recommendedJobs)}" class="empty-state">
            <h3>No Recommendations Yet</h3>
            <p>Complete your profile with skills and preferences to get personalized job recommendations.</p>
            <a th:href="@{/jobseeker/profile}" class="btn">Complete Profile</a>
        </div>
        
        <div th:each="job : ${recommendedJobs}" class="job-card">
            <div class="job-title" th:text="${job.title}"></div>
            <div class="company" th:text="${job.employer.companyName}"></div>
            <span class="match-badge">⭐ Recommended for you</span>
            
            <div class="job-details">
                <span>📍 <span th:text="${job.location}"></span></span>
                <span>💰 ₹<span th:text="${job.salaryMin}"></span> - ₹<span th:text="${job.salaryMax}"></span></span>
                <span>📅 Posted <span th:text="${#temporals.format(job.postedDate, 'dd MMM')}"></span></span>
            </div>
            
            <p th:text="${#strings.abbreviate(job.description, 200)}"></p>
            
            <a th:href="@{'/jobseeker/job/' + ${job.jobId}}" class="btn">View Job</a>
        </div>
    </div>
</body>
</html>
