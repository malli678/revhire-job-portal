<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Profile - RevHire</title>
    <meta charset="UTF-8">

    <style>

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #eef2ff, #f8fafc);
            padding: 40px;
            color: #2d3748;
        }

        .profile-card {
            max-width: 950px;
            margin: auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
        }

        /* HEADER */
        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .avatar {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background: #667eea;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
        }

        h2 { font-size: 28px; }

        .subtitle {
            color: #718096;
            font-size: 14px;
        }

        hr {
            margin: 30px 0;
            border: none;
            height: 1px;
            background: #edf2f7;
        }

        /* SECTION */
        .section { margin-bottom: 25px; }

        h3 {
            margin-bottom: 15px;
            color: #4c51bf;
        }

        /* FORM ROW ⭐⭐⭐ */
        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 14px;
        }

        button {
            padding: 10px 18px;
            border-radius: 10px;
            border: none;
            background: #667eea;
            color: white;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover { background: #5a67d8; }

        /* SKILL TAG */
        .skill-tag {
            display: inline-flex;
            align-items: center;
            background: #edf2f7;
            padding: 6px 12px;
            border-radius: 20px;
            margin: 5px 5px 0 0;
            font-size: 13px;
        }

        /* DELETE BUTTON ⭐⭐⭐ */
        .delete-btn {
            margin-left: 8px;
            background: #fc8181;
            color: white;
            border: none;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 11px;
            cursor: pointer;
        }

        .delete-btn:hover { background: #f56565; }

        /* INFO CARDS */
        .info-card {
            background: #f8fafc;
            padding: 15px;
            border-radius: 12px;
            margin-top: 10px;
            border-left: 4px solid #667eea;
            font-size: 14px;
        }

        /* EXPERIENCE CARD */
        .experience-card {
            background: #f8fafc;
            padding: 15px;
            border-radius: 12px;
            margin-top: 10px;
            border-left: 4px solid #667eea;
        }

        .btn-add-exp {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 18px;
            border-radius: 10px;
            background: #667eea;
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .btn-add-exp:hover { background: #5a67d8; }

        /* PROGRESS BAR */
        .progress-container {
            background: #edf2f7;
            border-radius: 30px;
            overflow: hidden;
            height: 26px;
            margin-top: 15px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #5a67d8);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 13px;
            font-weight: 600;
        }
		.nav-btn {
		    display: inline-block;
		    padding: 10px 18px;
		    background: #4c51bf;
		    color: white;
		    text-decoration: none;
		    border-radius: 10px;
		    font-size: 14px;
		    font-weight: 600;
		}

		.nav-btn:hover {
		    background: #434190;
		}
		
		.edit-btn {
		        background: #667eea;
		        color: white;
		        border: none;
		        padding: 4px 10px;
		        border-radius: 15px;
		        font-size: 12px;
		        cursor: pointer;
		        margin-left: 10px;
		    }
		    
		    .edit-btn:hover {
		        background: #5a67d8;
		    }
		    
		    #personal-edit form, #employment-edit form {
		        display: flex;
		        flex-direction: column;
		        gap: 10px;
		    }
		    
		    #personal-edit input, #employment-edit input, #employment-edit select {
		        padding: 8px;
		        border: 1px solid #ddd;
		        border-radius: 6px;
		    }
		    
		    #personal-edit button, #employment-edit button {
		        background: #28a745;
		        color: white;
		        border: none;
		        padding: 8px;
		        border-radius: 6px;
		        cursor: pointer;
		        margin-right: 10px;
		    }
		    
		    #personal-edit button[type="button"], #employment-edit button[type="button"] {
		        background: #6c757d;
		    }
    </style>
</head>

<body>

<div class="profile-card">

    <!-- HEADER -->
    <div class="header">
        <div class="avatar"
             th:text="${#strings.substring(user.fullName,0,1)}"></div>

        <div>
            <h2 th:text="${user.fullName}">Name</h2>
            <div class="subtitle">Profile Management</div>
        </div>
    </div>
	<div style="margin-bottom:20px;">
	    <a th:href="@{/jobseeker/dashboard}" class="nav-btn">
	        ← Back to Dashboard
	    </a>
	</div>

    <hr>

    <!-- PERSONAL DETAILS -->
	<div class="section">
	    <h3>👤 Personal Details 
	        <button class="edit-btn" onclick="toggleEdit('personal')">✏️ Edit</button>
	    </h3>
	    
	    <div id="personal-view" class="info-card">
	        <p><b>Name:</b> <span th:text="${user.fullName}"></span></p>
	        <p><b>Email:</b> <span th:text="${user.email}"></span></p>
	        <p><b>Phone:</b> <span th:text="${user.phoneNumber}"></span></p>
	        <p><b>Location:</b> <span th:text="${user.location ?: 'Not specified'}"></span></p>
	    </div>
	    
	    <div id="personal-edit" style="display:none;" class="info-card">
	        <form th:action="@{/jobseeker/profile/update/personal}" method="post">
	            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
	            
	            <label>Phone Number</label>
	            <input type="text" name="phoneNumber" th:value="${user.phoneNumber}" />
	            
	            <label>Location</label>
	            <input type="text" name="location" th:value="${user.location}" />
	            
	            <button type="submit">Save Changes</button>
	            <button type="button" onclick="cancelEdit('personal')">Cancel</button>
	        </form>
	    </div>
	</div>

	<!-- Update Employment section with edit button -->
	<div class="section">
	    <h3>💼 Employment 
	        <button class="edit-btn" onclick="toggleEdit('employment')">✏️ Edit</button>
	    </h3>
	    
	    <div id="employment-view" class="info-card">
	        <p><b>Status:</b> <span th:text="${user.currentEmploymentStatus ?: 'Not specified'}"></span></p>
	        <p><b>Company:</b> <span th:text="${user.currentCompany ?: 'Not specified'}"></span></p>
	        <p><b>Designation:</b> <span th:text="${user.designation ?: 'Not specified'}"></span></p>
	        <p><b>Experience:</b> <span th:text="${user.totalExperienceYears ?: '0'}"></span> Years</p>
	    </div>
	    
	    <div id="employment-edit" style="display:none;" class="info-card">
	        <form th:action="@{/jobseeker/profile/update/employment}" method="post">
	            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
	            
	            <label>Employment Status</label>
	            <select name="currentEmploymentStatus">
	                <option value="">Select</option>
	                <option value="Employed" th:selected="${user.currentEmploymentStatus == 'Employed'}">Employed</option>
	                <option value="Unemployed" th:selected="${user.currentEmploymentStatus == 'Unemployed'}">Unemployed</option>
	                <option value="Fresher" th:selected="${user.currentEmploymentStatus == 'Fresher'}">Fresher</option>
	                <option value="Student" th:selected="${user.currentEmploymentStatus == 'Student'}">Student</option>
	            </select>
	            
	            <label>Current Company</label>
	            <input type="text" name="currentCompany" th:value="${user.currentCompany}" />
	            
	            <label>Designation</label>
	            <input type="text" name="designation" th:value="${user.designation}" />
	            
	            <label>Total Experience (Years)</label>
	            <input type="number" name="totalExperienceYears" th:value="${user.totalExperienceYears}" min="0" step="1"/>
	            
	            <button type="submit">Save Changes</button>
	            <button type="button" onclick="cancelEdit('employment')">Cancel</button>
	        </form>
	    </div>
	</div>

    <hr>

    <!-- SKILLS -->
    <div class="section">
        <h3>🧠 Skills</h3>

        <form th:action="@{/jobseeker/profile/skill/add}" method="post">
            <div class="form-row">
                <input type="text" name="skillName" placeholder="Add Skill" required/>
                <button type="submit">Add</button>
            </div>
        </form>

        <div>
            <span th:each="skill : ${skills}" class="skill-tag">
                <span th:text="${skill.name}"></span>

                <form th:action="@{/jobseeker/profile/skill/delete/{id}(id=${skill.id})}"
                      method="post" style="display:inline;">
                    <button class="delete-btn">✖</button>
                </form>
            </span>
        </div>
    </div>

    <hr>

    <!-- EDUCATION -->
    <div class="section">
        <h3>🎓 Education</h3>

        <form th:action="@{/jobseeker/profile/education/add}" method="post">
            <div class="form-row">
                <input type="text" name="degree" placeholder="Degree" required/>
                <input type="text" name="institution" placeholder="Institution" required/>
                <button type="submit">Add</button>
            </div>
        </form>

        <div th:each="edu : ${education}" class="info-card">
            <b th:text="${edu.degree}"></b> -
            <span th:text="${edu.institution}"></span>

            <form th:action="@{/jobseeker/profile/education/delete/{id}(id=${edu.educationId})}"
                  method="post">
                <button class="delete-btn">✖</button>
            </form>
        </div>
    </div>

    <hr>

    <!-- CERTIFICATIONS -->
    <div class="section">
        <h3>🏆 Certifications</h3>

        <form th:action="@{/jobseeker/profile/certification/add}" method="post">
            <div class="form-row">
                <input type="text" name="name" placeholder="Certification" required/>
                <input type="text" name="issuer" placeholder="Issuer" required/>
                <input type="text" name="year" placeholder="Year"/>
                <button type="submit">Add</button>
            </div>
        </form>

        <div th:each="cert : ${certifications}" class="info-card">
            <b th:text="${cert.name}"></b> -
            <span th:text="${cert.issuer}"></span>
            (<span th:text="${cert.year}"></span>)

            <form th:action="@{/jobseeker/profile/certification/delete/{id}(id=${cert.id})}"
                  method="post">
                <button class="delete-btn">✖</button>
            </form>
        </div>
    </div>

    <hr>

    <!-- WORK EXPERIENCE -->
    <div class="section">
        <h3>🛠 Work Experience</h3>

        <div th:each="exp : ${user.experiences}" class="experience-card">
            <b th:text="${exp.designation}"></b>
            <p th:text="${exp.companyName}"></p>
            <p>
                <span th:text="${exp.startDate}"></span> -
                <span th:text="${exp.endDate}"></span>
            </p>
        </div>

        <a th:href="@{/jobseeker/experience/add}" class="btn-add-exp">
            + Add Experience
        </a>
    </div>

    <hr>

    <!-- PROFILE COMPLETION -->
    <div class="section">
        <h3>📊 Profile Completion</h3>

        <div class="progress-container">
            <div class="progress-bar"
                 th:style="'width:' + ${completion} + '%'">
                <span th:text="${completion + '%'}"></span>
            </div>
        </div>
    </div>

</div>
<script>
    function toggleEdit(section) {
        document.getElementById(section + '-view').style.display = 'none';
        document.getElementById(section + '-edit').style.display = 'block';
    }
    
    function cancelEdit(section) {
        document.getElementById(section + '-view').style.display = 'block';
        document.getElementById(section + '-edit').style.display = 'none';
    }
</script>
</body>
</html>
