<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Explore Jobs - RevHire</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Common Fragments Styles -->
    <style th:replace="~{fragments/header :: header-css}"></style>
    <style th:replace="~{fragments/footer :: footer-css}"></style>
    
    <link rel="stylesheet" th:href="@{/css/jobseeker-search-jobs.css}" />
</head>

<body class="bg-light">

    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container py-4">
        <div class="mb-3">
            <button onclick="history.back()" class="btn btn-outline-secondary btn-sm fw-bold">
                <i class="bi bi-arrow-left"></i> Back
            </button>
        </div>

        <div class="row g-4">
            <!-- FILTERS PANEL -->
            <div class="col-lg-3">
                <div class="card shadow-sm border-0 sticky-top" style="top: 80px;">
                    <div class="card-body p-4">
                        <form method="get" th:action="@{/jobs/search-page}">
                            <h5 class="card-title fw-bold mb-4 d-flex align-items-center gap-2 text-dark">
                                <i class="bi bi-search text-primary"></i> Find Your Fit
                            </h5>

                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold text-uppercase">Role Or Keyword</label>
                                <input type="text" name="title" class="form-control bg-light" placeholder="Software Engineer..." th:value="${param.title}" />
                            </div>

                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold text-uppercase">Preferred City</label>
                                <input type="text" name="location" class="form-control bg-light" placeholder="Pune, Bangalore..." th:value="${param.location}" />
                            </div>

                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold text-uppercase">Organization</label>
                                <input type="text" name="company" class="form-control bg-light" placeholder="Search brands..." th:value="${param.company}" />
                            </div>

                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold text-uppercase">Category</label>
                                <select name="jobType" class="form-select bg-light">
                                    <option value="">All Models</option>
                                    <option value="Full-time" th:selected="${param.jobType == 'Full-time'}">Full-time</option>
                                    <option value="Part-time" th:selected="${param.jobType == 'Part-time'}">Part-time</option>
                                    <option value="Contract" th:selected="${param.jobType == 'Contract'}">Contract</option>
                                    <option value="Internship" th:selected="${param.jobType == 'Internship'}">Internship</option>
                                    <option value="Remote" th:selected="${param.jobType == 'Remote'}">Remote</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold text-uppercase">Experience Years</label>
                                <div class="row g-2">
                                    <div class="col-6">
                                        <input type="number" name="minExp" class="form-control bg-light" placeholder="Min" min="0" th:value="${param.minExp}" />
                                    </div>
                                    <div class="col-6">
                                        <input type="number" name="maxExp" class="form-control bg-light" placeholder="Max" min="0" th:value="${param.maxExp}" />
                                    </div>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label text-muted small fw-bold text-uppercase">Salary (₹ / Year)</label>
                                <div class="row g-2">
                                    <div class="col-6">
                                        <input type="number" name="minSalary" class="form-control bg-light" placeholder="Min" step="100000" th:value="${param.minSalary}" />
                                    </div>
                                    <div class="col-6">
                                        <input type="number" name="maxSalary" class="form-control bg-light" placeholder="Max" step="100000" th:value="${param.maxSalary}" />
                                    </div>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 fw-bold py-2 mb-2 shadow-sm flex-grow-1">Search Now</button>
                            <a th:href="@{/jobseeker/search-jobs}" class="btn btn-link w-100 text-decoration-none text-muted fw-semibold">Reset Filters</a>
                        </form>
                    </div>
                </div>
            </div>

            <!-- JOBS LIST -->
            <div class="col-lg-9">
                <main>
                    <!-- Empty State -->
                    <div th:if="${jobs == null or jobs.isEmpty()}" class="card border-0 shadow-sm text-center py-5 rounded-4">
                        <div class="card-body">
                            <i class="bi bi-inbox text-muted display-1 mb-3"></i>
                            <h3 class="fw-bold">No matches found</h3>
                            <p class="text-secondary">Try broadening your horizons or adjusting the filters.</p>
                        </div>
                    </div>

                    <!-- Job Cards -->
                    <div th:each="job : ${jobs}" class="card border-0 shadow-sm rounded-4 mb-4 job-card-hover">
                        <div class="card-body p-4">
                            <h4 class="card-title fw-bold text-dark mb-1" th:text="${job.title}">Position</h4>
                            <h6 class="card-subtitle text-primary fw-bold mb-3" th:text="${job.employer != null ? job.employer.companyName : 'Organization'}">Company</h6>
                            
                            <p class="card-text text-secondary mb-4" th:text="${#strings.abbreviate(job.description, 180)}">Snippet</p>
                            
                            <div class="d-flex flex-wrap gap-2 mb-4">
                                <span class="badge bg-light text-dark border px-3 py-2 rounded-3" th:text="${job.jobType ?: 'Hybrid'}">Type</span>
                                <span class="badge bg-light text-dark border px-3 py-2 rounded-3" th:text="'Exp: ' + (${job.experienceRequired ?: 'Fresher'})">Experience</span>
                                <span class="badge bg-light text-dark border px-3 py-2 rounded-3" th:text="${job.location}">Location</span>
                            </div>

                            <hr class="text-muted opacity-25">

                            <div class="d-flex justify-content-between align-items-center mt-3">
                                <div class="fs-5 fw-bold text-dark d-flex align-items-center gap-2">
                                    <i class="bi bi-wallet2 text-success"></i>
                                    <th:block th:if="${job.salaryMin != null}">
                                        ₹<span th:text="${#numbers.formatInteger(job.salaryMin, 1, 'COMMA')}"></span>+
                                    </th:block>
                                    <th:block th:unless="${job.salaryMin != null}">Competitive Rate</th:block>
                                </div>
                                <a th:href="@{'/jobseeker/job/' + ${job.jobId}}" class="btn btn-primary fw-bold px-4 py-2 rounded-3">View Details <i class="bi bi-arrow-right"></i></a>
                            </div>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/footer :: footer}"></footer>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Common Fragments Scripts -->
    <script th:replace="~{fragments/header :: header-js}"></script>
</body>

</html>
