<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Explore Jobs - RevHire</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f2f5;
            color: #1a202c;
        }

        .wrapper {
            max-width: 1300px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 30px;
        }

        .filters-panel {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .filters-panel h3 {
            margin: 0 0 25px 0;
            font-size: 1.25rem;
            color: #1e293b;
        }

        .filter-group {
            margin-bottom: 20px;
        }

        .filter-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        input,
        select {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: 2px solid #edf2f7;
            background: #f8fafc;
        }

        .range-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn-search {
            width: 100%;
            padding: 14px;
            background: #4F46E5;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .clear-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            font-size: 0.85rem;
            color: #64748b;
            text-decoration: none;
        }

        .job-card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
        }

        .job-title {
            font-size: 1.4rem;
            font-weight: 800;
        }

        .company-name {
            color: #4F46E5;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .description-preview {
            color: #64748b;
            margin-bottom: 20px;
        }

        .tag-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .tag {
            background: #f1f5f9;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #edf2f7;
        }

        .btn-view {
            background: #4F46E5;
            color: white;
            padding: 10px 24px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
        }

        .empty-state {
            text-align: center;
            background: white;
            padding: 80px 40px;
            border-radius: 20px;
        }

        @media (max-width: 900px) {
            .wrapper {
                grid-template-columns: 1fr;
            }

            .filters-panel {
                position: static;
                margin-bottom: 30px;
            }
        }
    </style>

    <style th:replace="fragments/header :: header-css"></style>
    <style th:replace="fragments/footer :: footer-css"></style>
</head>

<body>

<div th:replace="fragments/header :: header"></div>

<div class="wrapper">

    <!-- FILTER PANEL -->
    <aside class="filters-panel">
        <form method="get" th:action="@{/jobs/search-page}">

            <h3>🔍 Find Your Fit</h3>

            <div class="filter-group">
                <label>Role Or Keyword</label>
                <input type="text" name="title" th:value="${param.title}" />
            </div>

            <div class="filter-group">
                <label>Preferred City</label>
                <input type="text" name="location" th:value="${param.location}" />
            </div>

            <div class="filter-group">
                <label>Organization</label>
                <input type="text" name="company" th:value="${param.company}" />
            </div>

            <div class="filter-group">
                <label>Category</label>
                <select name="jobType">
                    <option value="">All</option>
                    <option value="Full-time">Full-time</option>
                    <option value="Part-time">Part-time</option>
                    <option value="Contract">Contract</option>
                    <option value="Internship">Internship</option>
                    <option value="Remote">Remote</option>
                </select>
            </div>

            <div class="filter-group">
                <label>Experience Years</label>
                <div class="range-grid">
                    <input type="number" name="minExp" />
                    <input type="number" name="maxExp" />
                </div>
            </div>

            <div class="filter-group">
                <label>Salary (₹ / Year)</label>
                <div class="range-grid">
                    <input type="number" name="minSalary" />
                    <input type="number" name="maxSalary" />
                </div>
            </div>

            <button type="submit" class="btn-search">Search Now</button>
            <a th:href="@{/jobseeker/search-jobs}" class="clear-link">Reset Filters</a>

        </form>
    </aside>

    <!-- JOB LIST -->
    <main class="jobs-list">

        <div th:if="${jobs == null or jobs.isEmpty()}" class="empty-state">
            <h3>No matches found</h3>
            <p>Try adjusting the filters.</p>
        </div>

        <div th:each="job : ${jobs}" class="job-card">

            <div class="job-title" th:text="${job.title}">Title</div>

            <div class="company-name"
                 th:text="${job.employer != null ? job.employer.companyName : 'Organization'}">
            </div>

            <p class="description-preview"
               th:text="${#strings.abbreviate(job.description, 180)}"></p>

            <div class="tag-row">
                <span class="tag" th:text="${job.jobType}"></span>
                <span class="tag" th:text="'Exp: ' + ${job.experienceRequired}"></span>
                <span class="tag" th:text="${job.location}"></span>
            </div>

            <div class="card-footer">

                <div>
                    💰
                    <span th:text="${job.salaryMin}"></span>
                </div>

                <!-- ROLE BASED VIEW BUTTON -->

                <a th:if="${role=='JOBSEEKER'}"
                   th:href="@{'/jobseeker/job/' + ${job.jobId}}"
                   class="btn-view">
                    View Details →
                </a>

                <a th:if="${role=='EMPLOYER'}"
                   th:href="@{'/employer/job/' + ${job.jobId}}"
                   class="btn-view">
                    View Details →
                </a>

            </div>

        </div>

    </main>

</div>

<footer th:replace="fragments/footer :: footer"></footer>

<script th:replace="fragments/header :: header-js"></script>

</body>
</html>
