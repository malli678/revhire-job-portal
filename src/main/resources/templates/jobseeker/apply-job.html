<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Application Portal - RevHire</title>
    <meta charset="UTF-8">

    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f2f5;
            color: #1a202c;
        }

        .container {
            max-width: 600px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .apply-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
        }

        .header {
            margin-bottom: 30px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 20px;
        }

        .header h2 {
            margin: 0;
            font-size: 1.6rem;
            font-weight: 800;
            color: #1e293b;
        }

        .header p {
            margin: 5px 0 0 0;
            color: #4F46E5;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.8rem;
            font-weight: 800;
            color: #64748b;
            text-transform: uppercase;
        }

        input[type="file"],
        textarea {
            padding: 12px;
            border: 2px solid #edf2f7;
            border-radius: 12px;
            background: #f8fafc;
            font-size: 0.95rem;
        }

        textarea {
            height: 150px;
            resize: vertical;
        }

        .btn-submit {
            background: #4F46E5;
            color: white;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            width: 100%;
        }

        .btn-submit:hover {
            background: #4338ca;
        }

        .btn-cancel {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #64748b;
            text-decoration: none;
            font-weight: 600;
        }

        .btn-cancel:hover {
            color: #4F46E5;
        }
    </style>

    <style th:replace="fragments/header :: header-css"></style>
    <style th:replace="fragments/footer :: footer-css"></style>
</head>

<body>

<div th:replace="fragments/header :: header"></div>

<div class="container">
    <div class="apply-card">

        <div class="header">
            <h2>📝 Submit Application</h2>
            <p th:text="${job.title}">Position Title</p>
            <div style="font-size: 0.85rem; color: #64748b;"
                 th:text="${job.employer != null ? job.employer.companyName : 'Organization'}">
                Company
            </div>
        </div>

        <!-- ✅ CORRECT FORM MATCHING CONTROLLER -->
        <form th:action="@{/jobseeker/applyJob/{jobId}(jobId=${job.jobId})}"
              method="post"
              enctype="multipart/form-data">

            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}" />

            <div class="form-group">
                <label>Upload Resume</label>
                <input type="file"
                       name="resume"
                       accept=".pdf,.doc,.docx"
                       required />
            </div>

            <div class="form-group">
                <label>Cover Letter (Optional)</label>
                <textarea name="coverLetter"
                          placeholder="Write your cover letter here..."></textarea>
            </div>

            <button type="submit" class="btn-submit">
                🚀 Submit Application
            </button>

            <a th:href="@{'/jobseeker/job/' + ${job.jobId}}"
               class="btn-cancel">
                Cancel
            </a>

        </form>

    </div>
</div>

<footer th:replace="fragments/footer :: footer"></footer>
<script th:replace="fragments/header :: header-js"></script>

</body>
</html>
