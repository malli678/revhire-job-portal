<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Saved Jobs - RevHire</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Common Fragments Styles -->
    <style th:replace="~{fragments/header :: header-css}"></style>
    <style th:replace="~{fragments/footer :: footer-css}"></style>

    <!-- Shared Hover effect CSS -->
    <link rel="stylesheet" th:href="@{/css/jobseeker-search-jobs.css}" />
    
    <style>
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>

<body class="bg-light">

    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container py-5" style="max-width: 1000px;">
        <div class="mb-4">
            <button onclick="history.back()" class="btn btn-outline-secondary btn-sm fw-bold">
                <i class="bi bi-arrow-left"></i> Back
            </button>
        </div>
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3 fw-bold text-dark m-0 d-flex align-items-center gap-2">
                <i class="bi bi-bookmark-star-fill text-warning"></i> Saved Jobs
            </h1>
        </div>

        <div class="row g-4">
            <!-- EMPTY STATE -->
            <div th:if="${#lists.isEmpty(savedJobs)}" class="col-12 text-center py-5">
                <div class="card border-0 shadow-sm rounded-4 w-100 py-5">
                    <div class="card-body">
                        <i class="bi bi-bookmarks text-muted display-1 mb-3 d-block"></i>
                        <h3 class="fw-bold">Your saved folder is looking a bit light!</h3>
                        <p class="text-secondary mb-4">Found something interesting but not ready to apply? Save it here for later.</p>
                        <a th:href="@{/jobseeker/search-jobs}" class="btn btn-primary fw-bold px-4 py-2 rounded-3">Browse Jobs</a>
                    </div>
                </div>
            </div>

            <!-- JOB CARDS -->
            <div th:each="saved : ${savedJobs}" class="col-12 w-100">
                <div class="card border-0 shadow-sm rounded-4 job-card-hover job-card">
                    <div class="card-body p-4 d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
                        <div class="flex-grow-1">
                            <h4 class="card-title fw-bold text-dark mb-1">
                                <a th:href="@{/jobseeker/job/{id}(id=${saved.job.jobId})}" th:text="${saved.job.title}"
                                   class="text-dark text-decoration-none">Position</a>
                            </h4>
                            <h6 class="card-subtitle text-primary fw-bold mb-3" th:text="${saved.job.employer.companyName}">Organization</h6>
                            
                            <div class="d-flex flex-wrap gap-3 text-secondary fw-semibold">
                                <span class="d-flex align-items-center gap-1"><i class="bi bi-geo-alt-fill"></i> <span th:text="${saved.job.location}">Remote</span></span>
                                <span class="d-flex align-items-center gap-1"><i class="bi bi-briefcase-fill"></i> <span th:text="${saved.job.jobType}">Full-time</span></span>
                            </div>
                        </div>

                        <div class="d-flex align-items-center gap-2" th:id="'actions-' + ${saved.job.jobId}">
                            <a th:href="@{/jobseeker/job/{id}(id=${saved.job.jobId})}" class="btn btn-outline-secondary fw-bold px-3">
                                <i class="bi bi-eye"></i> View
                            </a>

                            <th:block th:if="${appliedJobIds != null and appliedJobIds.contains(saved.job.jobId)}">
                                <span class="badge bg-success bg-opacity-10 text-success px-3 py-2 fw-bold d-flex align-items-center gap-1">
                                    <i class="bi bi-check-circle-fill"></i> Applied
                                </span>
                            </th:block>

                            <button class="btn btn-outline-danger px-3 py-2" th:onclick="'removeSaved(' + ${saved.job.jobId} + ', this)'" title="Remove from list">
                                <i class="bi bi-x-lg"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/footer :: footer}"></footer>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Common Fragments Scripts -->
    <script th:replace="~{fragments/header :: header-js}"></script>

    <!-- External JS for Saved Jobs logic -->
    <script th:src="@{/js/jobseeker-saved-jobs.js}"></script>
</body>

</html>
