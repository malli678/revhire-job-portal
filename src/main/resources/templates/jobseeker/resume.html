<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Resume - RevHire</title>

    <style>
        body {
            font-family:'Segoe UI';
            background:#f5f6fa;
            padding:40px;
        }

        .card {
            background:white;
            padding:30px;
            border-radius:12px;
            max-width:520px;
            margin:auto;
            box-shadow:0 10px 30px rgba(0,0,0,0.05);
        }

        h2 {
            margin-top:0;
            margin-bottom:20px;
            color:#2d3748;
        }

        input[type="file"] {
            margin-top:10px;
        }

        button {
            background:#667eea;
            color:white;
            border:none;
            padding:12px 22px;
            border-radius:8px;
            cursor:pointer;
            font-size:14px;
            font-weight:600;
            transition:0.2s;
        }

        button:hover {
            background:#5563d6;
        }

        button:disabled {
            background:gray;
            cursor:not-allowed;
        }

        .error {
            color:#e53e3e;
            margin-top:12px;
            font-size:14px;
            font-weight:500;
        }

        .file-info {
            margin-top:12px;
            font-size:14px;
            color:#4a5568;
        }

        .success {
            background:#e6fffa;
            color:#065f46;
            padding:12px;
            border-radius:8px;
            margin-bottom:18px;
            font-weight:600;
            animation:fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity:0; transform:translateY(-5px); }
            to { opacity:1; transform:translateY(0); }
        }

        .hint {
            font-size:13px;
            color:#718096;
            margin-top:5px;
        }
    </style>
</head>
<body>

<div class="card">

    <h2>📎 Upload Resume</h2>

    <!-- ✅ SUCCESS MESSAGE -->
    <div th:if="${param.success}" class="success">
        ✅ Resume uploaded successfully!
    </div>

    <form method="post"
          enctype="multipart/form-data"
          th:action="@{/jobseeker/uploadResume}">

        <input type="file" id="resumeFile" name="file" required/>

        <div class="hint">Allowed size: Max 2MB</div>

        <div id="fileInfo" class="file-info"></div>
        <div id="errorMsg" class="error"></div>

        <br>

        <button id="uploadBtn" type="submit">Upload Resume</button>

    </form>

</div>

<!-- ✅ VALIDATION SCRIPT -->
<script>

const fileInput = document.getElementById("resumeFile");
const errorMsg = document.getElementById("errorMsg");
const fileInfo = document.getElementById("fileInfo");
const uploadBtn = document.getElementById("uploadBtn");

fileInput.addEventListener("change", function () {

    const file = this.files[0];
    const maxSize = 2 * 1024 * 1024; // 2MB

    if (file) {

        const sizeMB = (file.size / (1024 * 1024)).toFixed(2);

        fileInfo.innerText =
            "📄 " + file.name + " (" + sizeMB + " MB)";

        if (file.size > maxSize) {

            errorMsg.innerText = "❌ File size must be less than 2MB";
            uploadBtn.disabled = true;

        } else {

            errorMsg.innerText = "";
            uploadBtn.disabled = false;
        }
    }
});


// ✅ Auto hide success message
setTimeout(() => {
    const success = document.querySelector(".success");
    if(success) success.style.display = "none";
}, 3000);

</script>

</body>
</html>
