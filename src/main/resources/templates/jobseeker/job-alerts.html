<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Alerts - RevHire</title>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px 20px;
            margin: 0;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            color: white;
        }
        
        .header h1 {
            font-size: 28px;
            margin: 0;
        }
        
        .back-btn {
            background: white;
            color: #667eea;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
        }
        
        .create-btn {
            background: white;
            color: #667eea;
            padding: 12px 25px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 20px;
        }
        
        .alert-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .alert-info h3 {
            margin: 0 0 10px 0;
            color: #333;
        }
        
        .alert-details {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            color: #666;
            font-size: 14px;
            margin: 10px 0;
        }
        
        .badge {
            background: #667eea;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
        }
        
        .badge.active {
            background: #28a745;
        }
        
        .badge.inactive {
            background: #6c757d;
        }
        
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .btn {
            padding: 8px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-toggle {
            background: #ffc107;
            color: black;
        }
        
        .btn-delete {
            background: #dc3545;
            color: white;
        }
        
        .empty-state {
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 12px;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
		
    </style>
</head>
<body>
    <div class="container">
        
        <!-- Header -->
        <div class="header">
            <h1>🔔 Job Alerts</h1>
            <a th:href="@{/jobseeker/dashboard}" class="back-btn">← Dashboard</a>
        </div>
        
        
        <!-- Success/Error Messages -->
        <div th:if="${success}" class="alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert-error" th:text="${error}"></div>
        
        <!-- Create Button -->
        <a th:href="@{/jobseeker/alerts/create}" class="create-btn">+ Create New Alert</a>
        
        <!-- Empty State -->
        <div th:if="${alerts == null or #lists.isEmpty(alerts)}" class="empty-state">
            <h3>No Job Alerts Yet</h3>
            <p>Create your first alert to get notified about matching jobs!</p>
            <p style="color: #666; font-size: 14px; margin-top: 10px;">
                You can set alerts based on keywords, location, job type, and salary.
            </p>
        </div>
        
        <!-- Alerts List -->
        <div th:if="${alerts != null and not #lists.isEmpty(alerts)}">
            <div th:each="alert : ${alerts}" class="alert-card">
                
                <div class="alert-info">
                    <h3 th:text="${alert.alertName}">Alert Name</h3>
                    
                    <div class="alert-details">
                        <span th:if="${alert.keywords != null and !alert.keywords.isEmpty()}">
                            🔑 <span th:text="${alert.keywords}">java,spring</span>
                        </span>
                        <span th:if="${alert.location != null and !alert.location.isEmpty()}">
                            📍 <span th:text="${alert.location}">chennai</span>
                        </span>
                        <span th:if="${alert.jobType != null and !alert.jobType.isEmpty()}">
                            💼 <span th:text="${alert.jobType}">full-time</span>
                        </span>
                        <span th:if="${alert.minSalary != null}">
                            💰 ₹<span th:text="${alert.minSalary}">500000</span>+
                        </span>
                        <span>
                            ⏰ <span th:text="${alert.frequency != null ? alert.frequency : 'DAILY'}">DAILY</span>
                        </span>
                    </div>
                    
                    <div style="margin-top: 10px;">
                        <span class="badge" 
                              th:classappend="${alert.active} ? 'active' : 'inactive'"
                              th:text="${alert.active} ? 'Active' : 'Inactive'">
                        </span>
                        <span th:if="${alert.lastSentAt != null}" style="margin-left: 10px; color: #999; font-size: 12px;">
                            Last sent: <span th:text="${#temporals.format(alert.lastSentAt, 'dd MMM yyyy')}"></span>
                        </span>
                    </div>
                </div>
                
                <div class="actions">
                    <!-- Toggle Active/Inactive -->
                    <form th:action="@{/jobseeker/alerts/toggle/{id}(id=${alert.alertId})}" 
                          method="post" style="display: inline;">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <input type="hidden" name="active" th:value="${!alert.active}" />
                        <button type="submit" class="btn btn-toggle">
                            <span th:text="${alert.active} ? 'Deactivate' : 'Activate'"></span>
                        </button>
                    </form>
                    
                    <!-- Delete Alert -->
                    <form th:action="@{/jobseeker/alerts/delete/{id}(id=${alert.alertId})}" 
                          method="post" style="display: inline;"
                          onsubmit="return confirm('Are you sure you want to delete this alert?');">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-delete">Delete</button>
                    </form>
                </div>
            </div>
        </div>
        
    </div>
    
    <script>
        // Simple debug
        console.log('Job alerts page loaded');
        
        // CSRF token for forms
        const csrfToken = document.querySelector('meta[name="_csrf"]')?.content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;
        console.log('CSRF Token present:', !!csrfToken);
    </script>
</body>
</html>
