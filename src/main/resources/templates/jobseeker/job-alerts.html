<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Alerts - RevHire</title>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Common Fragments Styles -->
    <style th:replace="~{fragments/header :: header-css}"></style>
    <style th:replace="~{fragments/footer :: footer-css}"></style>
</head>
<body class="bg-light">

    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container py-5" style="max-width: 900px;">
        
        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
            <h1 class="h3 fw-bold text-dark m-0 d-flex align-items-center gap-2">
                <i class="bi bi-bell-fill text-primary"></i> Job Alerts
            </h1>
            <a th:href="@{/jobseeker/dashboard}" class="btn btn-outline-secondary fw-bold btn-sm">
                <i class="bi bi-arrow-left"></i> Dashboard
            </a>
        </div>
        
        <!-- Success/Error Messages -->
        <div th:if="${success}" class="alert alert-success fw-bold p-3 rounded-3 shadow-sm d-flex align-items-center gap-2 mb-4">
            <i class="bi bi-check-circle-fill"></i> <span th:text="${success}"></span>
        </div>
        <div th:if="${error}" class="alert alert-danger fw-bold p-3 rounded-3 shadow-sm d-flex align-items-center gap-2 mb-4">
            <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${error}"></span>
        </div>
        
        <!-- Create Button -->
        <div class="mb-4">
            <a th:href="@{/jobseeker/alerts/create}" class="btn btn-primary fw-bold shadow-sm py-2 px-4 rounded-3 d-inline-flex align-items-center gap-2">
                <i class="bi bi-plus-lg"></i> Create New Alert
            </a>
        </div>
        
        <!-- Empty State -->
        <div th:if="${alerts == null or #lists.isEmpty(alerts)}" class="card border-0 shadow-sm rounded-4 text-center py-5">
            <div class="card-body">
                <i class="bi bi-bell-slash text-muted display-1 mb-3"></i>
                <h3 class="fw-bold text-dark">No Job Alerts Yet</h3>
                <p class="text-secondary fw-semibold">Create your first alert to get notified about matching jobs!</p>
                <p class="text-muted small">
                    You can set alerts based on keywords, location, job type, and salary.
                </p>
            </div>
        </div>
        
        <!-- Alerts List -->
        <div th:if="${alerts != null and not #lists.isEmpty(alerts)}" class="d-flex flex-column gap-3">
            <div th:each="alert : ${alerts}" class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4 d-flex flex-column flex-md-row justify-content-between gap-4">
                    
                    <div class="flex-grow-1">
                        <div class="d-flex align-items-center gap-2 mb-3">
                            <h4 class="h5 fw-bold text-dark m-0" th:text="${alert.alertName}">Alert Name</h4>
                            <span class="badge rounded-pill fw-bold" 
                                  th:classappend="${alert.active} ? 'bg-success bg-opacity-10 text-success border border-success' : 'bg-secondary bg-opacity-10 text-secondary border border-secondary'"
                                  th:text="${alert.active} ? 'Active' : 'Inactive'">
                            </span>
                        </div>
                        
                        <div class="d-flex flex-wrap gap-2 text-secondary fw-semibold mb-3" style="font-size: 0.9rem;">
                            <span th:if="${alert.keywords != null and !alert.keywords.isEmpty()}" class="d-flex align-items-center gap-1 bg-light px-2 py-1 rounded">
                                <i class="bi bi-key-fill text-muted"></i> <span th:text="${alert.keywords}">java,spring</span>
                            </span>
                            <span th:if="${alert.location != null and !alert.location.isEmpty()}" class="d-flex align-items-center gap-1 bg-light px-2 py-1 rounded">
                                <i class="bi bi-geo-alt-fill text-muted"></i> <span th:text="${alert.location}">chennai</span>
                            </span>
                            <span th:if="${alert.jobType != null and !alert.jobType.isEmpty()}" class="d-flex align-items-center gap-1 bg-light px-2 py-1 rounded">
                                <i class="bi bi-briefcase-fill text-muted"></i> <span th:text="${alert.jobType}">full-time</span>
                            </span>
                            <span th:if="${alert.minSalary != null}" class="d-flex align-items-center gap-1 bg-light px-2 py-1 rounded">
                                <i class="bi bi-wallet2 text-muted"></i> ₹<span th:text="${alert.minSalary}">500000</span>+
                            </span>
                            <span class="d-flex align-items-center gap-1 bg-light px-2 py-1 rounded">
                                <i class="bi bi-clock-fill text-muted"></i> <span th:text="${alert.frequency != null ? alert.frequency : 'DAILY'}">DAILY</span>
                            </span>
                        </div>
                        
                        <div th:if="${alert.lastSentAt != null}" class="small text-muted fw-semibold">
                            <i class="bi bi-send-check"></i> Last sent: <span th:text="${#temporals.format(alert.lastSentAt, 'dd MMM yyyy')}"></span>
                        </div>
                    </div>
                    
                    <div class="d-flex flex-row flex-md-column gap-2 justify-content-center align-items-end">
                        <!-- Toggle Active/Inactive -->
                        <form th:action="@{/jobseeker/alerts/toggle/{id}(id=${alert.alertId})}" method="post" class="m-0">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <input type="hidden" name="active" th:value="${!alert.active}" />
                            <button type="submit" class="btn btn-warning fw-bold btn-sm shadow-sm" style="width: 120px;">
                                <i th:class="${alert.active} ? 'bi bi-pause-fill me-1' : 'bi bi-play-fill me-1'"></i>
                                <span th:text="${alert.active} ? 'Deactivate' : 'Activate'"></span>
                            </button>
                        </form>
                        
                        <!-- Delete Alert -->
                        <form th:action="@{/jobseeker/alerts/delete/{id}(id=${alert.alertId})}" method="post" class="m-0"
                              onsubmit="return confirm('Are you sure you want to delete this alert?');">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="btn btn-danger fw-bold btn-sm shadow-sm" style="width: 120px;">
                                <i class="bi bi-trash3-fill me-1"></i> Delete
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        
    </div>
    
    <footer th:replace="~{fragments/footer :: footer}"></footer>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:replace="~{fragments/header :: header-js}"></script>
    
    <script>
        // Simple debug
        console.log('Job alerts page loaded');
        
        // CSRF token for forms
        const csrfToken = document.querySelector('meta[name="_csrf"]')?.content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;
        console.log('CSRF Token present:', !!csrfToken);
    </script>
</body>
</html>
