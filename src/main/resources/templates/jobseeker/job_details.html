<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Job Details</title>
    <style>
        body { font-family:'Segoe UI'; background:#f5f6fa; padding:30px; }

        .card {
            background:white;
            padding:25px;
            border-radius:10px;
            max-width:900px;
            margin:auto;
            box-shadow:0 4px 20px rgba(0,0,0,0.05);
        }

        .company { color:#667eea; font-weight:bold; }

        button {
            background:#667eea;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:6px;
            cursor:pointer;
        }
    </style>
</head>
<body>

<div class="card">

    <h2 th:text="${job.title}"></h2>

    <div class="company" th:text="${job.employer.companyName}"></div>

    <p>📍 <span th:text="${job.location}"></span></p>

    <hr>

    <p th:text="${job.description}"></p>

    <br>

    <button th:attr="onclick=|saveJob(${job.jobId})|">Save Job</button>

</div>

<script>
function saveJob(id){
    fetch('/saveJob/' + id,{method:'POST'})
    .then(r=>r.text())
    .then(alert);
}
</script>

</body>
</html>
