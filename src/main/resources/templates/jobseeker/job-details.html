<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Job Details - RevHire</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f2f5;
            color: #1a202c;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .main-card {
            background: white;
            border-radius: 20px;
            padding: 45px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
        }

        .job-title {
            font-size: 2.2rem;
            font-weight: 800;
            color: #1e293b;
            margin: 0;
            line-height: 1.2;
        }

        .company-meta {
            margin-top: 10px;
            font-size: 1.2rem;
            color: #4F46E5;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 35px 0;
            padding: 25px;
            background: #f8fafc;
            border-radius: 16px;
            border: 1px solid #edf2f7;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .info-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #94a3b8;
            font-weight: 800;
            letter-spacing: 0.05em;
        }

        .info-value {
            font-size: 1.05rem;
            font-weight: 700;
            color: #334155;
        }

        .description-area {
            line-height: 1.8;
            color: #475569;
            font-size: 1.05rem;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 800;
            color: #1e293b;
            margin: 40px 0 20px 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .actions-bar {
            position: sticky;
            bottom: 20px;
            background: white;
            padding: 20px 30px;
            border-radius: 16px;
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.05), 0 10px 30px rgba(0, 0, 0, 0.05);
            display: flex;
            gap: 15px;
            margin-top: 50px;
            border: 1px solid #edf2f7;
            align-items: center;
        }

        .btn {
            padding: 14px 32px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .btn-apply {
            background: #4F46E5;
            color: white;
            flex: 2;
            justify-content: center;
        }

        .btn-apply:hover {
            background: #4338ca;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        .btn-apply:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        .btn-save {
            background: #f1f5f9;
            color: #475569;
            flex: 1;
            justify-content: center;
        }

        .btn-save:hover {
            background: #e2e8f0;
        }

        .btn-save.active {
            background: #fef3c7;
            color: #92400e;
            border: 1px solid #fde68a;
        }

        .tag {
            background: #e0e7ff;
            color: #4338ca;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            animation: slideIn 0.3s ease-out;
            z-index: 10000;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
    <!-- Common Fragments Styles -->
    <style th:replace="fragments/header :: header-css"></style>
    <style th:replace="fragments/footer :: footer-css"></style>
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
</head>

<body>

    <div th:replace="fragments/header :: header"></div>

    <div class="container">
        <div class="main-card">
            <div class="header-row">
                <div>
                    <h1 class="job-title" th:text="${job.title}">Position</h1>
                    <div class="company-meta">
                        <span
                            th:text="${job.employer != null ? job.employer.companyName : 'Organization'}">Company</span>
                        <a th:if="${job.employer != null}" th:href="@{'/employer/public/' + ${job.employer.userId}}"
                            style="font-size: 0.9rem; text-decoration: none;">View Detail →</a>
                    </div>
                </div>
                <div class="tag" th:text="${job.jobType}">Full-time</div>
            </div>

            <div class="info-grid">
                <div class="info-item">
                    <span class="info-label">📍 Office Location</span>
                    <span class="info-value" th:text="${job.location}">Remote</span>
                </div>
                <div class="info-item">
                    <span class="info-label">💰 Compensation</span>
                    <span class="info-value">
                        <th:block th:if="${job.salaryMin != null and job.salaryMax != null}">
                            ₹<span th:text="${#numbers.formatInteger(job.salaryMin, 1, 'COMMA')}"></span> - ₹<span
                                th:text="${#numbers.formatInteger(job.salaryMax, 1, 'COMMA')}"></span>
                        </th:block>
                        <th:block th:unless="${job.salaryMin != null and job.salaryMax != null}">Competitive Scale
                        </th:block>
                    </span>
                </div>
                <div class="info-item">
                    <span class="info-label">🎯 Experience Level</span>
                    <span class="info-value" th:text="${job.experienceRequired ?: 'Fresher'}">0-2 Years</span>
                </div>
                <div class="info-item" th:if="${job.deadline != null}">
                    <span class="info-label">⏳ Final Submission</span>
                    <span class="info-value" style="color: #ef4444;"
                        th:text="${#temporals.format(job.deadline, 'dd MMM yyyy')}">Date</span>
                </div>
            </div>

            <div class="description-area">
                <h3 class="section-title">📋 Job Description</h3>
                <p th:text="${job.description}" style="white-space: pre-line;">Full Description</p>

                <th:block th:if="${job.skillsRequired != null and !job.skillsRequired.isEmpty()}">
                    <h3 class="section-title">🛠 Required Skills</h3>
                    <p th:text="${job.skillsRequired}">Skills</p>
                </th:block>

                <th:block th:if="${job.educationRequired != null and !job.educationRequired.isEmpty()}">
                    <h3 class="section-title">🎓 Education Required</h3>
                    <p th:text="${job.educationRequired}">Education</p>
                </th:block>
            </div>

            <div class="actions-bar">
                <button class="btn btn-apply" id="applyBtn" th:disabled="${alreadyApplied}"
                    th:onclick="${alreadyApplied} ? '' : 'applyJob(' + ${job.jobId} + ')'">
                    <span th:text="${alreadyApplied} ? '✓ Applied' : '🚀 Apply Now'">Apply</span>
                </button>

                <button class="btn btn-save" id="saveBtn" th:onclick="'saveJob(' + ${job.jobId} + ')'">
                    ⭐ Save Job
                </button>

                <a th:href="@{/jobseeker/search-jobs}" class="btn btn-save" style="background:#f8fafc;">← Browse</a>
            </div>
        </div>
    </div>

    <footer th:replace="fragments/footer :: footer"></footer>

    <script th:replace="fragments/header :: header-js"></script>

    <script th:inline="javascript">
        const csrfToken = document.querySelector('meta[name="_csrf"]').content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

        function notify(msg, err = false) {
            const div = document.createElement('div');
            div.className = 'notification';
            div.style.background = err ? '#ef4444' : '#10b981';
            div.textContent = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        async function applyJob(id) {
            try {
                const res = await fetch('/jobseeker/applyJob/' + id, {
                    method: 'POST',
                    headers: { [csrfHeader]: csrfToken }
                });
                const msg = await res.text();
                if (msg.toLowerCase().includes('success')) {
                    notify('Application submitted successfully!');
                    document.getElementById('applyBtn').disabled = true;
                    document.getElementById('applyBtn').textContent = '✓ Applied';
                } else notify(msg, true);
            } catch (e) { notify('Submission failed', true); }
        }

        async function saveJob(id) {
            try {
                const res = await fetch('/jobseeker/saveJob/' + id, {
                    method: 'POST',
                    headers: { [csrfHeader]: csrfToken }
                });
                const msg = await res.text();
                notify(msg);
                if (msg.toLowerCase().includes('success')) {
                    const btn = document.getElementById('saveBtn');
                    btn.textContent = '✅ Bookmarked';
                    btn.classList.add('active');
                    btn.disabled = true;
                }
            } catch (e) { notify('Save failed', true); }
        }
    </script>
</body>

</html>
