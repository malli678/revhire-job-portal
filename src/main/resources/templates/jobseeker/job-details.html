<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Job Details - RevHire</title>
    <meta charset="UTF-8">

    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f2f5;
            color: #1a202c;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .main-card {
            background: white;
            border-radius: 20px;
            padding: 45px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
        }

        .job-title {
            font-size: 2rem;
            font-weight: 800;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .apply-section {
            margin-top: 40px;
            padding: 25px;
            background: #f8fafc;
            border-radius: 16px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .btn {
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-apply {
            background: #28a745;
            color: white;
        }

        .btn-save {
            background: #ffc107;
            color: black;
        }

        .btn-back {
            background: #6c757d;
            color: white;
            text-decoration: none;
        }
    </style>

    <style th:replace="fragments/header :: header-css"></style>
    <style th:replace="fragments/footer :: footer-css"></style>
</head>

<body>

<div th:replace="fragments/header :: header"></div>

<div class="container">
    <div class="main-card">

        <h1 class="job-title" th:text="${job.title}">Job Title</h1>
        <p>
            <strong th:text="${job.employer.companyName}">Company</strong>
        </p>

        <div class="info-grid">
            <div>
                <strong>Location:</strong>
                <span th:text="${job.location}"></span>
            </div>
            <div>
                <strong>Experience:</strong>
                <span th:text="${job.experienceRequired ?: 'Fresher'}"></span>
            </div>
            <div>
                <strong>Job Type:</strong>
                <span th:text="${job.jobType}"></span>
            </div>
        </div>

        <h3>Description</h3>
        <p th:text="${job.description}" style="white-space: pre-line;"></p>

        <!-- ========================= -->
        <!-- APPLY SECTION -->
        <!-- ========================= -->

        <div class="apply-section">

            <!-- Already Applied -->
            <div th:if="${alreadyApplied}">
                <button class="btn btn-apply"
                        style="background:#6c757d;"
                        disabled>
                    ✅ Already Applied
                </button>
            </div>

            <!-- Not Applied -->
            <div th:if="${!alreadyApplied}">
                <form th:action="@{/jobseeker/applyJob/{jobId}(jobId=${job.jobId})}"
                      method="post"
                      enctype="multipart/form-data">

                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}" />

                    <div class="form-group">
                        <label>Upload Resume</label>
                        <input type="file"
                               name="resume"
                               class="form-control"
                               accept=".pdf,.doc,.docx"
                               required>
                    </div>

                    <div class="form-group">
                        <label>Cover Letter (Optional)</label>
                        <textarea name="coverLetter"
                                  class="form-control"
                                  rows="4"
                                  placeholder="Write your cover letter..."></textarea>
                    </div>

                    <button type="submit" class="btn btn-apply">
                        🚀 Apply Now
                    </button>

                    <button type="button"
                            class="btn btn-save"
                            th:onclick="'saveJob(' + ${job.jobId} + ')'">
                        ⭐ Save Job
                    </button>

                    <a th:href="@{/jobseeker/search-jobs}"
                       class="btn btn-back">
                        ← Back
                    </a>

                </form>
            </div>

        </div>

    </div>
</div>

<footer th:replace="fragments/footer :: footer"></footer>
<script th:replace="fragments/header :: header-js"></script>

</body>
</html>
