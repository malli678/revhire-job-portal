<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>Job Details</title>
    <style>
        body { 
            font-family:'Segoe UI', Arial, sans-serif; 
            background:#f5f6fa; 
            padding:30px; 
        }
        .card {
            background:white;
            padding:25px;
            border-radius:10px;
            max-width:900px;
            margin:auto;
            box-shadow:0 4px 20px rgba(0,0,0,0.05);
        }
        h2 { margin-bottom:10px; }
        .company { 
            color:#667eea; 
            font-weight:bold; 
            margin-bottom:10px;
        }
        .info { margin-bottom:10px; }
        .btn {
            background:#667eea;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:6px;
            cursor:pointer;
            margin-right:10px;
        }
        .btn.apply { background:#28a745; }
        .btn.back { background:#6c757d; text-decoration:none; padding:10px 18px; }
    </style>
</head>
<body>

<div class="card">

    <!-- Job Title -->
    <h2 th:text="${job.title}">Job Title</h2>

    <!-- Company Name -->
    <div class="company" th:text="${job.employer.companyName}">Company Name</div>

    <!-- Location -->
    <div class="info">📍 <span th:text="${job.location}">Location</span></div>

    <!-- Salary -->
    <div class="info">
        💰 ₹<span th:text="${job.salaryMin}">0</span> - ₹<span th:text="${job.salaryMax}">0</span>
    </div>

    <hr>

    <!-- Job Description -->
    <p th:text="${job.description}">Job Description...</p>

    <br>

    <!-- Action Buttons -->
    <button class="btn apply" th:onclick="'applyJob(' + ${job.jobId} + ')'">Apply Job</button>
    <button class="btn" th:attr="onclick=|saveJob(${job.jobId})|">Save Job</button>
    <a th:href="@{/jobseeker/search-jobs}" class="btn back">Back</a>

</div>

<script>
    // Apply Job Function
    function applyJob(jobId) {
		fetch('/jobseeker/applyJob/' + jobId, {
		    method: 'POST',
		    credentials: 'same-origin'
		})
        .then(response => {
            if(response.ok){
                alert("Application Submitted Successfully!");
                window.location.href="/jobseeker/applications";
            } else {
                alert("Already Applied or Error Occurred");
            }
        })
        .catch(() => alert("Something went wrong"));
    }

    // Save Job Function with CSRF protection
    function saveJob(jobId) {
        const token = document.querySelector("meta[name='_csrf']").content;
        const header = document.querySelector("meta[name='_csrf_header']").content;

        fetch('/jobseeker/saveJob/' + jobId, {
            method: 'POST',
            headers: { [header]: token }
        })
        .then(response => response.text())
        .then(data => alert(data))
        .catch(error => console.error(error));
    }
</script>

</body>
</html>
