<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Applications</title>
    <style>
        body { font-family:'Segoe UI'; background:#f5f6fa; padding:30px; }

        .job-card {
            background:white;
            padding:20px;
            border-radius:10px;
            margin-bottom:15px;
            box-shadow:0 4px 15px rgba(0,0,0,0.05);
        }

        .company { color:#667eea; font-weight:bold; }

        .status {
            background:#667eea;
            color:white;
            padding:5px 12px;
            border-radius:20px;
            font-size:13px;
        }

        .withdraw-btn {
            margin-top:10px;
            padding:5px 10px;
            background:#ff4d4f;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }
    </style>
</head>
<body>

<h2>📄 My Applications</h2>

<div th:each="app : ${applications}" class="job-card">

    <h3 th:text="${app.job.title}"></h3>

    <div class="company" th:text="${app.job.employer.companyName}"></div>

    <p>
        Status:
        <span class="status" th:text="${app.status}"></span>
    </p>

    <p th:if="${app.status.name() == 'APPLIED'}">
        <form th:action="@{/applications/withdraw}" method="post">
            <input type="hidden" name="applicationId" th:value="${app.id}" />
            <button type="submit" class="withdraw-btn">Withdraw</button>
        </form>
    </p>

</div>

</body>
</html>
