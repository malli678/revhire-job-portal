<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Experience</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f8fafc;
            padding: 40px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 600px;
            margin: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ddd;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }
    </style>
</head>

<body>

<div class="card">

    <h2>Add Experience</h2>

    <form th:action="@{/jobseeker/experience/save}" 
          th:object="${experience}" 
          method="post">

        <label>Company Name</label>
        <input type="text" th:field="*{companyName}" required>

        <label>Designation</label>
        <input type="text" th:field="*{designation}" required>

        <label>Location</label>
        <input type="text" th:field="*{location}">

        <label>Start Date</label>
        <input type="date" th:field="*{startDate}" required>

        <label>End Date</label>
        <input type="date" th:field="*{endDate}">

        <label>Description</label>
        <textarea th:field="*{description}"></textarea>

        <button type="submit">Save Experience</button>

    </form>

</div>

</body>
</html>
