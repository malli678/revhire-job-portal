<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${company.companyName} + ' - Company Profile'">Company Profile</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 35px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .header {
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 30px;
        }
        .company-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            font-weight: bold;
        }
        .company-name {
            font-size: 28px;
            color: #333;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin: 25px 0;
            padding: 20px;
            background: #f8fafc;
            border-radius: 10px;
        }
        .stat-item {
            text-align: center;
            flex: 1;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            color: #718096;
            font-size: 14px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 25px 0;
        }
        .info-item {
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
        }
        .info-label {
            font-size: 12px;
            color: #718096;
            margin-bottom: 5px;
        }
        .info-value {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="company-logo" 
                     th:text="${#strings.substring(company.companyName,0,1)}"></div>
                <div>
                    <h1 class="company-name" th:text="${company.companyName}"></h1>
                    <p th:text="${company.industry}"></p>
                </div>
            </div>
            
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" th:text="${activeJobs}"></div>
                    <div class="stat-label">Active Jobs</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" th:text="${company.companySize ?: 'N/A'}"></div>
                    <div class="stat-label">Company Size</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" th:text="${company.headquarters ?: 'N/A'}"></div>
                    <div class="stat-label">Headquarters</div>
                </div>
            </div>
            
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">Industry</div>
                    <div class="info-value" th:text="${company.industry ?: 'Not specified'}"></div>
                </div>
                <div class="info-item">
                    <div class="info-label">Website</div>
                    <div class="info-value">
                        <a th:if="${company.companyWebsite}" 
                           th:href="${company.companyWebsite}" 
                           target="_blank" th:text="${company.companyWebsite}"></a>
                        <span th:unless="${company.companyWebsite}">Not provided</span>
                    </div>
                </div>
            </div>
            
            <div class="info-item" style="grid-column: span 2;">
                <div class="info-label">About Company</div>
                <div class="info-value" th:text="${company.companyDescription ?: 'No description provided'}"></div>
            </div>
            
            <a href="javascript:history.back()" class="back-btn">← Go Back</a>
        </div>
    </div>
</body>
</html>
