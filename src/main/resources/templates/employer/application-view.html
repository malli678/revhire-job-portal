<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Application View</title>
    <style>
        body { font-family: Arial; padding: 30px; }
        .card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .btn {
            padding: 8px 14px;
            border-radius: 6px;
            border: none;
            color: white;
            cursor: pointer;
        }
        .shortlist { background: #28a745; }
        .reject { background: #dc3545; }
        .download { background: #007bff; text-decoration:none; }
    </style>
</head>
<body>

<h1>Application Details</h1>

<div class="card">
    <h2>Candidate Information</h2>

    <p><b>Name:</b>
     <span th:text="${application.jobSeeker != null ? application.jobSeeker.getFullName() : 'N/A'}"></span>
    </p>

    <p><b>Email:</b>
        <span th:text="${application.jobSeeker.getEmail()}"></span>
    </p>

    <p><b>Phone:</b>
      <span th:text="${application.jobSeeker.getPhone()}"></span>
    </p>
</div>

<div class="card">
    <h2>Job Information</h2>

    <p><b>Job Title:</b>
        <span th:text="${application.job.title}"></span>
    </p>

    <p><b>Location:</b>
        <span th:text="${application.job.location}"></span>
    </p>

    <p><b>Experience Required:</b>
        <span th:text="${application.job.experienceRequired}"></span>
    </p>

    <p><b>Education Required:</b>
        <span th:text="${application.job.educationRequired}"></span>
    </p>
</div>

<div class="card">
    <h2>Resume</h2>

    <a th:href="@{/employer/download-resume/{id}(id=${application.id})}"
       class="btn download">
        Download Resume
    </a>
</div>

<div class="card">
    <h2>Decision</h2>

    <!-- Shortlist -->
    <form th:if="${application.status.name() == 'APPLIED'}"
          th:action="@{/employer/shortlist/{id}(id=${application.id})}"
          method="post">

        <input type="text" name="notes"
               placeholder="Shortlist reason"/>

        <button type="submit" class="btn shortlist">
            Shortlist
        </button>
    </form>

    <!-- Reject -->
    <form th:if="${application.status.name() == 'APPLIED' OR application.status.name() == 'SHORTLISTED'}"
          th:action="@{/employer/reject/{id}(id=${application.id})}"
          method="post">

        <input type="text" name="notes"
               placeholder="Rejection reason"/>

        <button type="submit" class="btn reject">
            Reject
        </button>
    </form>

    <p th:if="${application.status.name() == 'REJECTED'}"
       style="color:gray;">
        Final Decision: Rejected
    </p>

</div>

</body>
</html>
