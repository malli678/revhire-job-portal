<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Post Job - RevHire</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Common Fragments Styles -->
    <style th:replace="~{fragments/header :: header-css}"></style>
    <style th:replace="~{fragments/footer :: footer-css}"></style>
    <style>
        .required::after {
            content: " *";
            color: #dc3545;
        }
    </style>
</head>

<body class="bg-light">

    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container py-5" style="max-width: 800px;">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-header bg-white border-bottom p-4 text-center">
                <h2 class="h3 fw-bold text-dark m-0 d-flex justify-content-center align-items-center gap-2">
                    <i class="bi bi-pencil-square text-primary"></i> Post New Opportunity
                </h2>
            </div>
            
            <div class="card-body p-4 p-md-5">
                <form th:action="@{/jobs/save}" method="post" th:object="${jobDto}" id="postJobForm" novalidate>
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div class="row g-4">
                        <div class="col-12">
                            <label class="form-label fw-bold text-secondary small text-uppercase required">Job Title</label>
                            <input type="text" th:field="*{title}" id="title" class="form-control form-control-lg bg-light" placeholder="e.g. Senior Full Stack Engineer" required />
                            <div class="invalid-feedback client-error" id="titleError"></div>
                            <div class="form-text small">Use a clear, descriptive title</div>
                        </div>

                        <div class="col-12">
                            <label class="form-label fw-bold text-secondary small text-uppercase required">Job Description</label>
                            <textarea th:field="*{description}" id="description" class="form-control bg-light" rows="6" placeholder="Detail the responsibilities, requirements, and culture..." action></textarea>
                            <div class="invalid-feedback client-error" id="descriptionError"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold text-secondary small text-uppercase required">Location</label>
                            <input type="text" th:field="*{location}" id="location" class="form-control bg-light" placeholder="e.g. Hyderabad, IN or Remote" required />
                            <div class="invalid-feedback client-error" id="locationError"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold text-secondary small text-uppercase required">Job Type</label>
                            <select th:field="*{jobType}" id="jobType" class="form-select bg-light" required>
                                <option value="">Select Category</option>
                                <option value="Full-time">Full-time</option>
                                <option value="Part-time">Part-time</option>
                                <option value="Contract">Contract</option>
                                <option value="Internship">Internship</option>
                                <option value="Freelance">Freelance</option>
                            </select>
                            <div class="invalid-feedback client-error" id="jobTypeError"></div>
                        </div>

                        <div class="col-12">
                            <label class="form-label fw-bold text-secondary small text-uppercase required">Core Skills Required</label>
                            <input type="text" name="skillsRequired" id="skillsRequired" class="form-control bg-light" placeholder="e.g. Java, React, Docker" th:value="*{skillsRequired}" required />
                            <div class="invalid-feedback client-error" id="skillsRequiredError"></div>
                            <div class="form-text small">Separate with commas (e.g. Java, Python, AWS)</div>
                        </div>

                        <div class="col-12">
                            <label class="form-label fw-bold text-secondary small text-uppercase">Preferred Education</label>
                            <input type="text" name="educationRequired" class="form-control bg-light" placeholder="e.g. Bachelor's in CS or equivalent" th:value="*{educationRequired}" />
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold text-secondary small text-uppercase">Target Experience</label>
                            <input type="text" name="experienceRequired" class="form-control bg-light" placeholder="e.g. 5+ Years" th:value="*{experienceRequired}" />
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold text-secondary small text-uppercase">Available Vacancies</label>
                            <input type="number" name="numberOfOpenings" class="form-control bg-light" min="1" th:value="*{numberOfOpenings ?: 1}" />
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold text-secondary small text-uppercase">Min Salary (₹ Annual)</label>
                            <input type="number" id="salaryMin" name="salaryMin" class="form-control bg-light" placeholder="500000" min="0" step="50000" th:value="*{salaryMin}" />
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold text-secondary small text-uppercase">Max Salary (₹ Annual)</label>
                            <input type="number" id="salaryMax" name="salaryMax" class="form-control bg-light" placeholder="1500000" min="0" step="50000" th:value="*{salaryMax}" />
                            <div class="invalid-feedback client-error" id="salaryMaxError"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold text-secondary small text-uppercase">Application Deadline</label>
                            <input type="datetime-local" name="deadline" class="form-control bg-light" th:value="*{deadline}" />
                            <div class="form-text small">Candidates cannot apply after this date</div>
                        </div>
                    </div>

                    <hr class="my-4 opacity-25">

                    <div class="row g-3">
                        <div class="col-md-6">
                            <button type="submit" class="btn btn-primary w-100 fw-bold py-3 fs-6 rounded-3">
                                <i class="bi bi-send-fill me-2"></i> Publish Job
                            </button>
                        </div>
                        <div class="col-md-6">
                            <a href="/employer/dashboard" class="btn btn-light w-100 fw-bold py-3 fs-6 rounded-3 text-secondary border">
                                Cancel
                            </a>
                        </div>
                    </div>

                </form>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/footer :: footer}"></footer>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:replace="~{fragments/header :: header-js}"></script>

    <script>
        document.getElementById('postJobForm').addEventListener('submit', function (event) {
            let isValid = true;

            // Clear previous errors - remove is-invalid class from all elements
            document.querySelectorAll('.is-invalid').forEach(el => el.classList.remove('is-invalid'));
            document.querySelectorAll('.invalid-feedback').forEach(el => el.textContent = '');

            function setError(id, message) {
                document.getElementById(id).classList.add('is-invalid');
                document.getElementById(id + 'Error').textContent = message;
                document.getElementById(id + 'Error').style.display = 'block';
                isValid = false;
            }

            // Title validation
            const title = document.getElementById('title');
            if (!title.value.trim()) {
                setError('title', 'Job title is required');
            }

            // Description validation
            const description = document.getElementById('description');
            if (!description.value.trim()) {
                setError('description', 'Job description is required');
            }

            // Location validation
            const location = document.getElementById('location');
            if (!location.value.trim()) {
                setError('location', 'Location is required');
            }

            // Job Type validation
            const jobType = document.getElementById('jobType');
            if (!jobType.value) {
                setError('jobType', 'Please select a job type');
            }

            // Skills validation
            const skills = document.getElementById('skillsRequired');
            if (!skills.value.trim()) {
                setError('skillsRequired', 'Skills are required');
            }

            // Salary Validation (Max >= Min)
            const minSal = document.getElementById('salaryMin');
            const maxSal = document.getElementById('salaryMax');
            if (minSal.value && maxSal.value) {
                const minVal = parseFloat(minSal.value);
                const maxVal = parseFloat(maxSal.value);
                if (maxVal < minVal) {
                    setError('salaryMax', 'Maximum salary cannot be less than minimum salary.');
                }
            }

            if (!isValid) {
                event.preventDefault();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });
    </script>
</body>

</html>
