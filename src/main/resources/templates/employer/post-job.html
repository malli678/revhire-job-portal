<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Post Job - RevHire</title>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 30px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 35px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        h2 {
            margin-top: 0;
            margin-bottom: 25px;
            color: #333;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
            font-size: 14px;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e1e1;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-row .form-group {
            flex: 1;
            margin-bottom: 0;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102,126,234,0.4);
        }

        .btn-secondary {
            background: #6c757d;
            margin-top: 10px;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: white;
            text-decoration: none;
            font-size: 16px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .required:after {
            content: " *";
            color: #dc3545;
        }

        .hint {
            font-size: 12px;
            color: #6c757d;
            margin-top: 5px;
        }
    </style>
</head>

<body>

<div class="container">

    <a href="/employer/dashboard" class="back-link">← Back to Dashboard</a>

    <div class="card">

        <h2>📝 Post New Job</h2>

        <form th:action="@{/jobs/save}" method="post" th:object="${jobDto}">
            
            <!-- CSRF Token -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="form-group">
                <label class="required">Job Title</label>
                <input type="text" th:field="*{title}" placeholder="e.g. Senior Java Developer" required/>
            </div>

            <div class="form-group">
                <label class="required">Job Description</label>
                <textarea th:field="*{description}" placeholder="Describe the role, responsibilities, and requirements..." required></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="required">Location</label>
                    <input type="text" th:field="*{location}" placeholder="e.g. Chennai, Bangalore, Remote" required/>
                </div>

                <div class="form-group">
                    <label class="required">Job Type</label>
                    <select th:field="*{jobType}" required>
                        <option value="">Select Type</option>
                        <option value="Full-time">Full-time</option>
                        <option value="Part-time">Part-time</option>
                        <option value="Contract">Contract</option>
                        <option value="Internship">Internship</option>
                        <option value="Remote">Remote</option>
                    </select>
                </div>
            </div>

            <!-- NEW: Skills Required -->
            <div class="form-group">
                <label class="required">Required Skills</label>
                <input type="text" name="skillsRequired" placeholder="e.g. Java, Spring Boot, SQL (comma separated)" 
                       th:value="*{skillsRequired}" required/>
                <div class="hint">Separate multiple skills with commas</div>
            </div>

            <!-- NEW: Education Required -->
            <div class="form-group">
                <label>Education Required</label>
                <input type="text" name="educationRequired" placeholder="e.g. B.Tech, MCA, B.Sc" 
                       th:value="*{educationRequired}"/>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Experience Required</label>
                    <input type="text" name="experienceRequired" placeholder="e.g. 3-5 years" 
                           th:value="*{experienceRequired}"/>
                </div>

                <div class="form-group">
                    <label>Number of Openings</label>
                    <input type="number" name="numberOfOpenings" placeholder="e.g. 2" min="1" 
                           th:value="*{numberOfOpenings ?: 1}"/>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Minimum Salary (₹)</label>
                    <input type="number" name="salaryMin" placeholder="e.g. 500000" min="0" step="10000" 
                           th:value="*{salaryMin}"/>
                </div>

                <div class="form-group">
                    <label>Maximum Salary (₹)</label>
                    <input type="number" name="salaryMax" placeholder="e.g. 1200000" min="0" step="10000" 
                           th:value="*{salaryMax}"/>
                </div>
            </div>

            <!-- NEW: Application Deadline -->
            <div class="form-group">
                <label>Application Deadline</label>
                <input type="datetime-local" name="deadline" th:value="*{deadline}"/>
                <div class="hint">Leave empty for no deadline</div>
            </div>

            <button type="submit" class="btn">Post Job</button>

            <a href="/employer/dashboard" class="btn btn-secondary">Cancel</a>

        </form>

    </div>

</div>

<!-- Add CSRF token for AJAX if needed -->
<script>
    const csrfToken = document.querySelector('meta[name="_csrf"]')?.content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;
</script>

</body>
</html>
