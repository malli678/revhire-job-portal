<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Edit Job - RevHire</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Common Fragments Styles -->
    <style th:replace="~{fragments/header :: header-css}"></style>
    <style th:replace="~{fragments/footer :: footer-css}"></style>
</head>

<body class="bg-light">

    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container py-5" style="max-width: 800px; min-height: 80vh;">
        <div class="mb-4">
            <a th:href="@{/employer/manage-jobs}" class="btn btn-light fw-bold text-secondary border px-3 py-2 rounded-3 text-decoration-none">
                <i class="bi bi-arrow-left"></i> Back to Manage Jobs
            </a>
        </div>

        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-header bg-white border-bottom p-4">
                <h2 class="h4 fw-bold text-dark m-0 d-flex align-items-center gap-2">
                    <i class="bi bi-pencil-square text-primary"></i> Update Assignment
                </h2>
            </div>

            <div class="card-body p-4 p-md-5">
                <form th:action="@{'/employer/job/update/' + ${job.jobId}}" method="post" id="editJobForm" novalidate>
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div class="row g-4 mb-4">
                        <!-- Job Title -->
                        <div class="col-12">
                            <label class="form-label fw-bold text-secondary small text-uppercase tracking-wider">Position Designation</label>
                            <input type="text" name="title" id="title" class="form-control form-control-lg bg-light"
                                th:value="${job.title}" placeholder="e.g. Lead Technical Architect" required />
                            <div class="invalid-feedback client-error fw-semibold mt-2" id="titleError"></div>
                        </div>

                        <!-- Description -->
                        <div class="col-12">
                            <label class="form-label fw-bold text-secondary small text-uppercase tracking-wider">Strategic Mandate (Description)</label>
                            <textarea name="description" id="description" class="form-control form-control-lg bg-light" rows="5"
                                th:text="${job.description}" placeholder="Outline the core responsibilities and expectations..." required></textarea>
                            <div class="invalid-feedback client-error fw-semibold mt-2" id="descriptionError"></div>
                        </div>

                        <!-- Location & Job Type -->
                        <div class="col-md-6">
                            <label class="form-label fw-bold text-secondary small text-uppercase tracking-wider">Deployment Location</label>
                            <input type="text" name="location" id="location" class="form-control form-control-lg bg-light"
                                th:value="${job.location}" placeholder="e.g. London, UK / Remote" required />
                            <div class="invalid-feedback client-error fw-semibold mt-2" id="locationError"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold text-secondary small text-uppercase tracking-wider">Employment Model</label>
                            <select name="jobType" id="jobType" class="form-select form-select-lg bg-light" required>
                                <option value="Full-time" th:selected="${job.jobType == 'Full-time'}">Full-time</option>
                                <option value="Part-time" th:selected="${job.jobType == 'Part-time'}">Part-time</option>
                                <option value="Contract" th:selected="${job.jobType == 'Contract'}">Contract</option>
                                <option value="Internship" th:selected="${job.jobType == 'Internship'}">Internship</option>
                            </select>
                            <div class="invalid-feedback client-error fw-semibold mt-2" id="jobTypeError"></div>
                        </div>

                        <!-- Experience -->
                        <div class="col-12">
                            <label class="form-label fw-bold text-secondary small text-uppercase tracking-wider">Prerequisite Experience</label>
                            <input type="text" name="experienceRequired" class="form-control form-control-lg bg-light"
                                th:value="${job.experienceRequired}" placeholder="e.g. 5+ years" />
                        </div>

                        <!-- Salary -->
                        <div class="col-md-6">
                            <label class="form-label fw-bold text-secondary small text-uppercase tracking-wider">Floor Remuneration</label>
                            <input type="number" name="salaryMin" class="form-control form-control-lg bg-light" th:value="${job.salaryMin}" placeholder="Min Salary" />
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold text-secondary small text-uppercase tracking-wider">Ceiling Remuneration</label>
                            <input type="number" name="salaryMax" class="form-control form-control-lg bg-light" th:value="${job.salaryMax}" placeholder="Max Salary" />
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <div class="mt-5 pt-3 border-top">
                        <button class="btn btn-primary btn-lg w-100 fw-bold rounded-3" type="submit">
                            <i class="bi bi-floppy-fill me-2"></i> Synchronize Updates
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/footer :: footer}"></footer>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:replace="~{fragments/header :: header-js}"></script>

    <script>
        document.getElementById('editJobForm').addEventListener('submit', function (event) {
            let isValid = true;

            // Clear previous errors
            document.querySelectorAll('.is-invalid').forEach(el => el.classList.remove('is-invalid'));
            document.querySelectorAll('.client-error').forEach(el => {
                el.style.display = 'none';
                el.textContent = '';
            });

            const showError = (id, message) => {
                const input = document.getElementById(id);
                const errorDiv = document.getElementById(id + 'Error');
                input.classList.add('is-invalid');
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
                isValid = false;
            };

            // Validation
            const title = document.getElementById('title');
            if (!title.value.trim()) showError('title', 'Position designation is required');

            const description = document.getElementById('description');
            if (!description.value.trim()) showError('description', 'Strategic mandate is required');

            const location = document.getElementById('location');
            if (!location.value.trim()) showError('location', 'Deployment location is required');

            const jobType = document.getElementById('jobType');
            if (!jobType.value) showError('jobType', 'Please select an employment model');

            if (!isValid) {
                event.preventDefault();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });
    </script>
</body>

</html>
