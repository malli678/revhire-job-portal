<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Applicant Profile - RevHire</title>
    <meta charset="UTF-8">
    <th:block th:insert="~{fragments/header :: header-css}"></th:block>
    <th:block th:insert="~{fragments/footer :: footer-css}"></th:block>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #f8fafc;
        }

        .details-wrapper {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .profile-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .profile-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 40px;
            border-bottom: 1px solid #edf2f7;
            padding-bottom: 25px;
        }

        .applicant-name {
            font-size: 2rem;
            font-weight: 800;
            color: #1e293b;
            margin: 0;
        }

        .status-pill {
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 800;
            text-transform: uppercase;
            background: #e0e7ff;
            color: #4338ca;
        }

        .section-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .info-box {
            background: #f8fafc;
            padding: 24px;
            border-radius: 16px;
            border: 1px solid #edf2f7;
        }

        .info-box h3 {
            margin-top: 0;
            font-size: 1.1rem;
            color: #4F46E5;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .data-item {
            margin-bottom: 15px;
        }

        .data-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #94a3b8;
            font-weight: 800;
            letter-spacing: 0.05em;
        }

        .data-value {
            font-weight: 700;
            color: #334155;
            display: block;
            margin-top: 4px;
        }

        .resume-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #4F46E5;
            color: white;
            padding: 14px 28px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.2s;
            margin-top: 20px;
        }

        .resume-btn:hover {
            background: #4338ca;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #64748b;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .back-link:hover {
            color: #4F46E5;
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="details-wrapper">
        <a th:href="@{/employer/dashboard}" class="back-link">← Return to Dashboard</a>

        <div class="profile-card" th:if="${application != null}">
            <div class="profile-header">
                <div>
                    <h1 class="applicant-name"
                        th:text="${applicant != null ? applicant.fullName : 'Anonymous Applicant'}">Name</h1>
                    <p style="color: #64748b; font-weight: 600; margin-top: 5px;"
                        th:text="'Applying for: ' + ${application.job != null ? application.job.title : 'Position'}">Job
                        Title</p>
                </div>
                <div class="status-pill" th:text="${application.status}">Applied</div>
            </div>

            <div class="section-grid">
                <div class="info-box" th:if="${applicant != null}">
                    <h3>👤 Contact Details</h3>
                    <div class="data-item">
                        <span class="data-label">Email</span>
                        <span class="data-value" th:text="${applicant.email}">email@example.com</span>
                    </div>
                    <div class="data-item">
                        <span class="data-label">Phone</span>
                        <span class="data-value" th:text="${applicant.phoneNumber ?: 'Not provided'}">Phone</span>
                    </div>
                </div>

                <div class="info-box">
                    <h3>📅 Application Meta</h3>
                    <div class="data-item">
                        <span class="data-label">Submission Date</span>
                        <span class="data-value"
                            th:text="${application.appliedDate != null ? #temporals.format(application.appliedDate, 'dd MMM yyyy, HH:mm') : 'Unknown'}">Date</span>
                    </div>
                    <div class="data-item" th:if="${application.notes != null}">
                        <span class="data-label">Internal Notes</span>
                        <span class="data-value" th:text="${application.notes}">Notes</span>
                    </div>
                </div>
            </div>

            <div class="info-box" style="margin-top: 30px;"
                th:if="${applicant != null and applicant.resumeText != null}">
                <h3>📝 Professional Summary / Resume</h3>
                <div style="background: white; padding: 20px; border-radius: 12px; border: 1px solid #edf2f7; white-space: pre-wrap; color: #475569;"
                    th:text="${applicant.resumeText}">Text</div>
            </div>

            <div th:if="${application.resumePath != null or (applicant != null and applicant.resumeFile != null)}"
                style="margin-top: 30px;">
                <a th:href="@{/employer/download-resume/{id}(id=${application.id})}" class="resume-btn">
                    📥 Download Uploaded Resume
                </a>
            </div>

		
        <div th:unless="${application != null}" style="text-align: center; padding: 100px;">
            <h2>Application not found or inaccessible.</h2>
        </div>
    </div>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
    <th:block th:insert="~{fragments/header :: header-js}"></th:block>
</body>

</html>
