<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Edit Company Profile - RevHire</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f2f5;
            color: #1a202c;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .main-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
        }

        .header-section {
            margin-bottom: 35px;
            padding-bottom: 20px;
            border-bottom: 1px solid #edf2f7;
            text-align: center;
        }

        .header-section h2 {
            margin: 0;
            font-size: 1.8rem;
            color: #1e293b;
            font-weight: 800;
        }

        .edit-form {
            display: grid;
            gap: 25px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.8rem;
            font-weight: 800;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input,
        textarea {
            padding: 12px 16px;
            border-radius: 10px;
            border: 2px solid #edf2f7;
            background: #f8fafc;
            font-size: 1rem;
            transition: all 0.2s;
            color: #1e293b;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #4F46E5;
            background: white;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        textarea {
            height: 120px;
            resize: vertical;
        }

        .form-actions {
            margin-top: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            text-decoration: none;
            border: none;
        }

        .btn-save {
            background: #4F46E5;
            color: white;
        }

        .btn-save:hover {
            background: #4338ca;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        .btn-cancel {
            background: #f1f5f9;
            color: #475569;
        }

        .btn-cancel:hover {
            background: #e2e8f0;
        }

        .success-banner {
            background: #10b981;
            color: white;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 25px;
            font-weight: 700;
            text-align: center;
        }
    </style>
    <!-- Common Fragments Styles -->
    <style th:replace="fragments/header :: header-css"></style>
    <style th:replace="fragments/footer :: footer-css"></style>
</head>

<body>

    <div th:replace="fragments/header :: header"></div>

    <div class="container">
        <div class="main-card">
            <div class="header-section">
                <h2>✏️ Refine Corporate Profile</h2>
            </div>

            <!-- SUCCESS MESSAGE -->
            <div th:if="${successMessage}" class="success-banner" th:text="${successMessage}"></div>

            <form th:action="@{/employer/company-profile/update}" method="post" th:object="${profileDto}"
                class="edit-form" id="profileForm" novalidate>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div class="form-group">
                    <label>Company Display Name</label>
                    <input type="text" th:field="*{companyName}" id="companyName" placeholder="e.g. Revature Inc."
                        required />
                    <span class="error client-error" id="companyNameError"
                        style="color: #e53e3e; font-size: 0.8rem; margin-top: 4px;"></span>
                </div>

                <div class="form-group">
                    <label>Industry Vertical</label>
                    <input type="text" th:field="*{industry}" id="industry" placeholder="e.g. Fintech, E-commerce..." />
                    <span class="error client-error" id="industryError"
                        style="color: #e53e3e; font-size: 0.8rem; margin-top: 4px;"></span>
                </div>

                <div class="form-group">
                    <label>Organization Size</label>
                    <input type="text" th:field="*{companySize}" placeholder="e.g. 1000+ Employees" />
                </div>

                <div class="form-group">
                    <label>Digital Home (URL)</label>
                    <input type="text" th:field="*{companyWebsite}" placeholder="www.example.com" />
                </div>

                <div class="form-group">
                    <label>Mission & Description</label>
                    <textarea th:field="*{companyDescription}"
                        placeholder="Tell candidates about your company's core values and culture..."></textarea>
                </div>

                <div class="form-group">
                    <label>Global Headquarters</label>
                    <input type="text" th:field="*{headquarters}" id="headquarters"
                        placeholder="e.g. San Francisco, US" />
                    <span class="error client-error" id="headquartersError"
                        style="color: #e53e3e; font-size: 0.8rem; margin-top: 4px;"></span>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-save">💾 Commit Refinement</button>
                    <a href="/employer/company-profile" class="btn btn-cancel">Discard Changes</a>
                </div>
            </form>
        </div>
    </div>

    <footer th:replace="fragments/footer :: footer"></footer>

    <!-- Common Fragments Scripts -->
    <script th:replace="fragments/header :: header-js"></script>

    <script>
        document.getElementById('profileForm').addEventListener('submit', function (event) {
            let isValid = true;

            // Clear previous errors
            document.querySelectorAll('.client-error').forEach(el => el.textContent = '');

            // Company Name validation
            const companyName = document.getElementById('companyName');
            if (!companyName.value.trim()) {
                document.getElementById('companyNameError').textContent = 'Company display name is required';
                isValid = false;
            }

            // Industry validation
            const industry = document.getElementById('industry');
            if (!industry.value.trim()) {
                document.getElementById('industryError').textContent = 'Industry vertical is required';
                isValid = false;
            }

            // Headquarters validation
            const headquarters = document.getElementById('headquarters');
            if (!headquarters.value.trim()) {
                document.getElementById('headquartersError').textContent = 'Global headquarters is required';
                isValid = false;
            }

            if (!isValid) {
                event.preventDefault();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });
    </script>
</body>

</html>
