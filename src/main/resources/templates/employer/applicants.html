<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Applicants - RevHire</title>
	<meta charset="UTF-8">

	<style>
		body {
			font-family: 'Segoe UI', Arial, sans-serif;
			background: #f4f6f9;
			color: #2d3748;
		}

		/* PAGE TITLE */
		h2 {
			margin-bottom: 25px;
			font-weight: 700;
			color: #1a202c;
		}

		/* STATUS BADGES */
		.badge {
			padding: 6px 14px;
			border-radius: 20px;
			color: white;
			font-size: 11px;
			font-weight: 600;
			display: inline-block;
			letter-spacing: 0.3px;
		}

		.badge.status-APPLIED {
			background: #667eea;
			color: white;
		}

		.badge.status-UNDER_REVIEW {
			background: #ffc107;
			color: #333;
		}

		.badge.status-SHORTLISTED {
			background: #28a745;
			color: white;
		}

		.badge.status-REJECTED {
			background: #dc3545;
			color: white;
		}

		.badge.status-WITHDRAWN {
			background: #6c757d;
			color: white;
		}

		.candidate-card {
			transition: transform 0.2s, box-shadow 0.2s;
		}

		.candidate-card:hover {
			transform: translateY(-5px);
			box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15) !important;
		}
	</style>
	<!-- Common Fragments Styles -->
	<style th:replace="fragments/header :: header-css"></style>
	<style th:replace="fragments/footer :: footer-css"></style>
</head>

<body>

	<div th:replace="fragments/header :: header"></div>

	<div style="padding: 40px; max-width: 1250px; margin: 0 auto; min-height: 80vh;">

		<!-- Error/Success Messages -->
		<div th:if="${errorMessage}"
			style="background: #fee2e2; color: #dc2626; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #fecaca; font-weight: 600;">
			<span th:text="${errorMessage}"></span>
		</div>
		<div th:if="${successMessage}"
			style="background: #dcfce7; color: #16a34a; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #bbf7d0; font-weight: 600;">
			<span th:text="${successMessage}"></span>
		</div>

		<div style="display: flex; align-items: center; gap: 15px; margin-bottom: 25px;">
			<button onclick="history.back()"
				style="background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 1.1rem;">←</button>
			<h2 style="margin: 0;">📋 Applicants List</h2>
		</div>

		<div
			style="background: white; padding: 25px; border-radius: 12px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; flex-wrap: wrap; gap: 15px; align-items: center;">
			<input type="text" id="skillFilter" placeholder="Skill"
				style="padding: 12px 15px; border-radius: 8px; border: 1px solid #ddd; flex: 1; min-width: 150px;">
			<input type="number" id="expFilter" placeholder="Min Experience"
				style="padding: 12px 15px; border-radius: 8px; border: 1px solid #ddd; flex: 1; min-width: 150px;">
			<input type="text" id="eduFilter" placeholder="Education"
				style="padding: 12px 15px; border-radius: 8px; border: 1px solid #ddd; flex: 1; min-width: 150px;">
			<select id="statusFilter"
				style="padding: 12px 15px; border-radius: 8px; border: 1px solid #ddd; flex: 1; min-width: 150px;">
				<option value="All Status">All Status</option>
				<option value="APPLIED">APPLIED</option>
				<option value="UNDER_REVIEW">UNDER_REVIEW</option>
				<option value="SHORTLISTED">SHORTLISTED</option>
				<option value="REJECTED">REJECTED</option>
			</select>
			<input type="date" id="dateFilter"
				style="padding: 12px 15px; border-radius: 8px; border: 1px solid #ddd; flex: 1; min-width: 150px;">
			<button onclick="applyFilters()"
				style="background: #4F46E5; color: white; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; font-weight: 600;">Apply
				Filters</button>
			<button onclick="resetFilters()"
				style="background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: 600;">Reset</button>
		</div>

		<!-- ✅ BULK ACTIONS -->
		<div id="bulkActions"
			style="display:none; background: #EEF2FF; padding: 15px 25px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #C7D2FE; display: flex; justify-content: space-between; align-items: center; animation: slideIn 0.3s ease-out;">
			<div>
				<span id="selectedCount" style="font-weight: 800; color: #4F46E5;">0</span> applicants selected
			</div>
			<div style="display: flex; gap: 15px;">
				<button onclick="openBulkStatusModal('SHORTLISTED')"
					style="background: #10B981; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 700;">Bulk
					Shortlist</button>
				<button onclick="openBulkStatusModal('REJECTED')"
					style="background: #EF4444; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 700;">Bulk
					Reject</button>
				<button onclick="clearSelection()"
					style="background: white; color: #64748B; border: 1px solid #E2E8F0; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 700;">Cancel</button>
			</div>
		</div>

		<div id="applicantGrid"
			style="display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 20px; padding-bottom: 40px;">

			<div th:each="app : ${applications}" class="candidate-card"
				th:data-skills="${#strings.listJoin(app.jobSeeker.skills, ',').toLowerCase()}"
				th:data-exp="${app.jobSeeker.totalExperienceYears ?: 0}"
				th:data-edu="${app.jobSeeker.degree ?: 'Not Specified'}" th:data-status="${app.status}"
				th:data-date="${app.appliedDate}" th:style="'background: white; border-radius: 12px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; border-left: 6px solid ' + 
                     (${app.status.name() == 'APPLIED'} ? '#667eea' : 
                      (${app.status.name() == 'SHORTLISTED'} ? '#28a745' : 
                       (${app.status.name() == 'REJECTED'} ? '#dc3545' : 
                        (${app.status.name() == 'UNDER_REVIEW'} ? '#ffc107' : '#6c757d'))))">


				<div
					style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px;">
					<h3 th:text="${app.jobSeeker.fullName}" style="margin: 0; color: #333; font-size: 1.4rem;">Candidate
						Name</h3>
					<span th:text="${app.status}" th:class="'badge status-' + ${app.status}"
						style="padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; text-transform: uppercase;">APPLIED</span>
				</div>
				<div
					style="margin-bottom: 20px; border-bottom: 1px solid #f0f0f0; padding-bottom: 15px; font-size: 0.95rem; color: #666; line-height: 1.6;">
					<p style="margin-bottom: 8px;"><strong style="color: #4a5568;">Applied for:</strong> <span
							th:text="${app.job.title}" style="color: #2d3748; font-weight: 600;">Job Title</span></p>
					<p><strong>Applied:</strong> <span
							th:text="${app.appliedDate != null ? #temporals.format(app.appliedDate, 'MMM dd, yyyy, hh:mm:ss a') : 'Not available'}">Date</span>
					</p>
					<p><strong>Education:</strong>
						<span
							th:text="${(app.jobSeeker.degree != null and app.jobSeeker.degree != '') ? app.jobSeeker.degree : 
                                   (app.jobSeeker.educationEntities != null and !app.jobSeeker.educationEntities.isEmpty() ? app.jobSeeker.educationEntities[0].degree : 
                                   (app.jobSeeker.education != null and !app.jobSeeker.education.isEmpty() ? app.jobSeeker.education[0].degree : 'Not Specified'))}">Education</span>
					</p>
					<p><strong>Experience:</strong> <span
							th:text="${app.jobSeeker.totalExperienceYears != null ? app.jobSeeker.totalExperienceYears + ' Years' : 'Fresher'}">Experience</span>
					</p>
					<p><strong>Skills:</strong></p>
					<div style="display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; margin-bottom: 8px;">
						<!-- From skillEntities (Skill entity table) -->
						<span th:each="skill : ${app.jobSeeker.skillEntities}" th:text="${skill.name}"
							style="background: #eef2f7; color: #667eea; padding: 3px 10px; border-radius: 6px; font-size: 0.8rem;"></span>
						<!-- From skills Set (ElementCollection) -->
						<span th:each="skill : ${app.jobSeeker.skills}" th:text="${skill}"
							style="background: #eef2f7; color: #667eea; padding: 3px 10px; border-radius: 6px; font-size: 0.8rem;"></span>
						<!-- Fallback if both empty -->
						<span
							th:if="${(app.jobSeeker.skillEntities == null or app.jobSeeker.skillEntities.isEmpty()) and (app.jobSeeker.skills == null or app.jobSeeker.skills.isEmpty())}"
							style="color: #94a3b8; font-size: 0.85rem; font-style: italic;">None listed</span>
					</div>
					<div class="card-actions"
						style="display: flex; gap: 10px; padding-top: 20px; border-top: 1px solid #f0f2f5;">
						<button type="button" th:if="${app.status.name() != 'WITHDRAWN'}"
							th:onclick="'openStatusModal(' + ${app.id} + ', \'\')'"
							style="flex: 1; background: #667eea; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: 600;">Update
							Status</button>
						<button type="button" th:if="${app.status.name() == 'WITHDRAWN'}" disabled
							style="flex: 1; background: #cbd5e0; color: #718096; border: none; padding: 10px; border-radius: 8px; cursor: not-allowed; font-weight: 600;">Withdrawn</button>
						<button type="button" th:onclick="'openNoteModal(' + ${app.id} + ')'"
							style="flex: 1; background: #6c757d; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: 600;">Add
							Note</button>
						<a th:href="@{/employer/applicant/{applicationId}(applicationId=${app.id})}"
							style="flex: 1; text-decoration: none;">
							<button
								style="width: 100%; background: #20c997; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: 600;">View
								Profile</button>
						</a>
					</div>
				</div>
			</div>

			<!-- Modals -->
			<div id="noteModal"
				style="display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">
				<div
					style="background:white; width:450px; margin:100px auto; padding:25px; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,0.2);">
					<h3>📌 Add Internal Note</h3>
					<form id="noteForm" th:action="@{/applications/add-notes}" method="post">
						<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
						<input type="hidden" name="applicationId" id="noteApplicationId" />

						<div style="margin-bottom:15px;">
							<label style="display:block; margin-bottom:8px; font-weight:600;">Your Note:</label>
							<textarea name="notes" id="noteContent" required
								style="width:100%; height:120px; padding:12px; border-radius:8px; border:1px solid #ddd; resize: vertical;"
								placeholder="Internal tracking notes..."></textarea>
						</div>

						<div style="display:flex; justify-content:flex-end; gap:12px;">
							<button type="button" onclick="closeNoteModal()"
								style="background:#f1f5f9; color:#475569; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:600;">Cancel</button>
							<button type="submit"
								style="background:#667eea; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:600;">Save
								Note</button>
						</div>
					</form>
				</div>
			</div>

			<div id="statusModal"
				style="display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">
				<div
					style="background:white; width:400px; margin:100px auto; padding:25px; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,0.2);">
					<h3 id="modalTitle">Update Status</h3>
					<form id="statusForm" method="post">
						<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
						<div style="margin-bottom:15px;">
							<label style="display:block; margin-bottom:5px; font-weight:bold;">New Status:</label>
							<select name="status" id="targetStatus" required
								style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;">
								<option value="" disabled selected>Select Status</option>
								<option value="UNDER_REVIEW">Under Review</option>
								<option value="SHORTLISTED">Shortlisted</option>
								<option value="REJECTED">Rejected</option>
							</select>
						</div>

						<div style="margin-bottom:15px;">
							<label style="display:block; margin-bottom:5px; font-weight:bold;">Notes / Reason:</label>
							<textarea name="notes" id="statusNotes"
								style="width:100%; height:80px; padding:10px; border-radius:8px; border:1px solid #ddd;"
								placeholder="Optional notes for candidate..."></textarea>
						</div>

						<div style="display:flex; justify-content:flex-end; gap:10px;">
							<button type="button" onclick="closeStatusModal()"
								style="background:#6c757d; color:white; border:none; padding:8px 16px; border-radius:6px; cursor:pointer;">Cancel</button>
							<button type="submit"
								style="background:#28a745; color:white; border:none; padding:8px 16px; border-radius:6px; cursor:pointer;">Update
								Status</button>
						</div>
					</form>
				</div>
			</div>
		</div>

		<footer th:replace="fragments/footer :: footer"></footer>

		<!-- Common Fragments Scripts -->
		<script th:replace="fragments/header :: header-js"></script>

		<script>
			function applyFilters() {
				const skill = document.getElementById('skillFilter').value.toLowerCase();
				const exp = parseInt(document.getElementById('expFilter').value) || 0;
				const edu = document.getElementById('eduFilter').value.toLowerCase();
				const status = document.getElementById('statusFilter').value;
				const date = document.getElementById('dateFilter').value;

				const cards = document.querySelectorAll('.candidate-card');
				cards.forEach(card => {
					const cardSkills = card.getAttribute('data-skills');
					const cardExp = parseInt(card.getAttribute('data-exp')) || 0;
					const cardEdu = card.getAttribute('data-edu').toLowerCase();
					const cardStatus = card.getAttribute('data-status');
					const cardDate = card.getAttribute('data-date');

					let show = true;
					if (skill && !cardSkills.includes(skill)) show = false;
					if (exp && cardExp < exp) show = false;
					if (edu && !cardEdu.includes(edu)) show = false;
					if (status !== 'All Status' && cardStatus !== status) show = false;
					if (date && !cardDate.startsWith(date)) show = false;

					card.style.display = show ? 'block' : 'none';
				});
			}

			function resetFilters() {
				document.getElementById('skillFilter').value = '';
				document.getElementById('expFilter').value = '';
				document.getElementById('eduFilter').value = '';
				document.getElementById('statusFilter').value = 'All Status';
				document.getElementById('dateFilter').value = '';
				applyFilters();
			}

			function updateBulkUI() {
				const checkboxes = document.querySelectorAll('.app-checkbox:checked');
				const count = checkboxes.length;
				const bulkActions = document.getElementById('bulkActions');
				const selectedCount = document.getElementById('selectedCount');

				if (count > 0) {
					bulkActions.style.display = 'flex';
					selectedCount.textContent = count;
				} else {
					bulkActions.style.display = 'none';
				}
			}

			function clearSelection() {
				document.querySelectorAll('.app-checkbox').forEach(cb => cb.checked = false);
				updateBulkUI();
			}

			function openBulkStatusModal(status) {
				const checkboxes = document.querySelectorAll('.app-checkbox:checked');
				const ids = Array.from(checkboxes).map(cb => cb.value).join(',');

				// Reusing existing status modal for bulk action
				document.getElementById('statusModal').style.display = 'block';
				document.getElementById('modalTitle').textContent = 'Bulk Update to ' + status;
				document.getElementById('targetStatus').value = status;
				document.getElementById('statusForm').action = '/employer/application/bulk-update?ids=' + ids;
				document.getElementById('statusNotes').value = '';
			}

			function openStatusModal(applicationId, currentStatus) {
				document.getElementById('statusModal').style.display = 'block';
				document.getElementById('modalTitle').textContent = 'Update Application Status';
				if (currentStatus) {
					document.getElementById('targetStatus').value = currentStatus;
				}
				document.getElementById('statusForm').action = '/employer/application/update-status/' + applicationId;
				document.getElementById('statusNotes').value = '';
			}
			function closeStatusModal() {
				document.getElementById('statusModal').style.display = 'none';
			}
			function openNoteModal(applicationId) {
				document.getElementById('noteModal').style.display = 'block';
				document.getElementById('noteApplicationId').value = applicationId;
				document.getElementById('noteForm').action = '/applications/add-notes';
				document.getElementById('noteContent').value = '';
			}
			function closeNoteModal() {
				document.getElementById('noteModal').style.display = 'none';
			}
			window.onclick = function (event) {
				if (event.target == document.getElementById('statusModal')) closeStatusModal();
				if (event.target == document.getElementById('noteModal')) closeNoteModal();
			}

			// Initial UI check
			updateBulkUI();
		</script>
</body>

</html>
