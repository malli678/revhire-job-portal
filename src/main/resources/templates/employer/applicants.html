<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Applicants - RevHire</title>
    <meta charset="UTF-8">

    <style>

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 35px;
            background: #f4f6f9;
            color: #2d3748;
        }

        h2 {
            margin-bottom: 20px;
        }

        /* BACK BUTTON ⭐⭐⭐ */
        .top-bar {
            margin-bottom: 15px;
        }

        .back-btn {
            text-decoration: none;
            background: #28a745;
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 13px;
        }

        .back-btn:hover {
            background: #218838;
        }

        /* FILTER PANEL ⭐⭐⭐⭐⭐ */
        .filters {
            background: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .filters input,
        .filters select {
            padding: 7px 10px;
            border-radius: 6px;
            border: 1px solid #ddd;
            font-size: 13px;
        }

        .filters button {
            padding: 7px 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .filters button:hover {
            background: #0069d9;
        }

        /* TABLE ⭐⭐⭐⭐⭐ */
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
        }

        th {
            background: #007bff;
            color: white;
            padding: 12px;
            font-size: 13px;
            text-align: left;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            font-size: 13px;
        }

        tr:hover {
            background: #f8f9fa;
        }

        /* STATUS BADGES ⭐⭐⭐⭐⭐ */
        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            color: white;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
        }

        .APPLIED { background: #6c757d; }
        .SHORTLISTED { background: #28a745; }
        .REJECTED { background: #dc3545; }
        .WITHDRAWN { background: #343a40; }

        /* ACTION BUTTONS ⭐⭐⭐⭐⭐ */
        .action-buttons {
            display: flex;
            gap: 6px;
        }

        button {
            padding: 6px 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }

        .shortlist {
            background: #28a745;
            color: white;
        }

        .reject {
            background: #dc3545;
            color: white;
        }

        .save {
            background: #17a2b8;
            color: white;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }

        /* NOTES ⭐⭐⭐⭐⭐ */
        .notes-form {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .notes-input {
            width: 150px;
            padding: 6px;
            border-radius: 6px;
            border: 1px solid #ddd;
            font-size: 12px;
        }

        /* EMPTY STATE ⭐⭐⭐⭐⭐ */
        .empty-row {
            text-align: center;
            padding: 30px;
            color: #718096;
            font-size: 14px;
            font-weight: 500;
        }

    </style>
</head>

<body>

<div class="top-bar">
    <a href="/employer/dashboard" class="back-btn">⬅ Back to Dashboard</a>
</div>

<h2>📋 Applicants List</h2>

<!-- ✅ FILTER FORM ⭐⭐⭐⭐⭐ -->
<form th:action="@{/employer/applicants}" method="get" class="filters">

    <input type="text" name="skill"
           placeholder="Skill"
           th:value="${param.skill}" />

    <input type="number" name="experience"
           placeholder="Min Experience"
           th:value="${param.experience}" />

    <input type="text" name="education"
           placeholder="Education"
           th:value="${param.education}" />

    <select name="status">
        <option value="">All Status</option>
        <option value="APPLIED" th:selected="${param.status == 'APPLIED'}">Applied</option>
        <option value="SHORTLISTED" th:selected="${param.status == 'SHORTLISTED'}">Shortlisted</option>
        <option value="REJECTED" th:selected="${param.status == 'REJECTED'}">Rejected</option>
        <option value="WITHDRAWN" th:selected="${param.status == 'WITHDRAWN'}">Withdrawn</option>
    </select>

    <input type="datetime-local" name="date"
           th:value="${param.date}" />

    <button type="submit">Filter</button>

</form>

<table>
    <tr>
        <th>Candidate</th>
        <th>Status</th>
        <th>Applied Date</th>
        <th>Actions</th>
        <th>Notes</th>
    </tr>

    <tr th:each="app : ${applications}">

        <td th:text="${app.jobSeeker.fullName}"></td>

        <td>
            <span th:text="${app.status}"
                  th:class="'badge ' + ${app.status}">
            </span>
        </td>

        <td th:text="${#temporals.format(app.appliedDate, 'dd-MM-yyyy HH:mm')}"></td>

        <!-- ACTIONS -->
        <td>
            <div class="action-buttons">

                <form th:action="@{/applications/shortlist}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <input type="hidden" name="applicationId" th:value="${app.id}" />

                    <button class="shortlist"
                            th:disabled="${app.status != 'APPLIED'}">
                        Shortlist
                    </button>
                </form>

                <form th:action="@{/applications/reject}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <input type="hidden" name="applicationId" th:value="${app.id}" />

                    <button class="reject"
                            th:disabled="${app.status != 'APPLIED'}">
                        Reject
                    </button>
                </form>

            </div>
        </td>

        <!-- NOTES -->
        <td>
            <form th:action="@{/applications/add-notes}" method="post" class="notes-form">

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" name="applicationId" th:value="${app.id}" />

                <input type="text"
                       name="notes"
                       th:value="${app.notes}"
                       class="notes-input"
                       placeholder="Add note"/>

                <button class="save">Save</button>

            </form>
        </td>

    </tr>

    <!-- EMPTY STATE -->
    <tr th:if="${#lists.isEmpty(applications)}">
        <td colspan="5" class="empty-row">
            No applicants found for selected filters.
        </td>
    </tr>

</table>

</body>
</html>
