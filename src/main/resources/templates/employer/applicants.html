<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Applicants - RevHire</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Common Fragments Styles -->
    <style th:replace="~{fragments/header :: header-css}"></style>
    <style th:replace="~{fragments/footer :: footer-css}"></style>

    <style>
        .candidate-card {
            transition: all 0.2s ease-in-out;
            cursor: default;
        }
        .candidate-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1) !important;
            border-color: #dee2e6 !important;
        }
    </style>
</head>

<body class="bg-light">

    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container py-5" style="max-width: 1400px; min-height: 80vh;">
        <!-- Error/Success Messages -->
        <div th:if="${errorMessage}" class="alert alert-danger d-flex align-items-center gap-2 fw-bold shadow-sm rounded-4 mb-4">
            <i class="bi bi-exclamation-triangle-fill fs-5"></i>
            <span th:text="${errorMessage}"></span>
        </div>
        <div th:if="${successMessage}" class="alert alert-success d-flex align-items-center gap-2 fw-bold shadow-sm rounded-4 mb-4">
            <i class="bi bi-check-circle-fill fs-5"></i>
            <span th:text="${successMessage}"></span>
        </div>

        <div class="d-flex align-items-center gap-3 mb-4">
            <button onclick="history.back()" class="btn btn-light fw-bold text-secondary border px-3 py-2 rounded-3">
                <i class="bi bi-arrow-left"></i>
            </button>
            <h2 class="h3 fw-bold text-dark m-0 d-flex align-items-center gap-2">
                <i class="bi bi-people-fill text-primary"></i> Applicants List
            </h2>
        </div>

        <!-- Filters -->
        <div class="card border-0 shadow-sm rounded-4 mb-4">
            <div class="card-body p-4">
                <div class="row g-3 align-items-end">
                    <div class="col-md-3 col-sm-6">
                        <label class="form-label small fw-bold text-secondary text-uppercase tracking-wider">Skill</label>
                        <input type="text" id="skillFilter" class="form-control bg-light" placeholder="e.g. Java">
                    </div>
                    <div class="col-md-2 col-sm-6">
                        <label class="form-label small fw-bold text-secondary text-uppercase tracking-wider">Min Exp (Yrs)</label>
                        <input type="number" id="expFilter" class="form-control bg-light" placeholder="0">
                    </div>
                    <div class="col-md-2 col-sm-6">
                        <label class="form-label small fw-bold text-secondary text-uppercase tracking-wider">Education</label>
                        <input type="text" id="eduFilter" class="form-control bg-light" placeholder="e.g. B.Tech">
                    </div>
                    <div class="col-md-2 col-sm-6">
                        <label class="form-label small fw-bold text-secondary text-uppercase tracking-wider">Status</label>
                        <select id="statusFilter" class="form-select bg-light">
                            <option value="All Status">All Status</option>
                            <option value="APPLIED">Applied</option>
                            <option value="UNDER_REVIEW">Under Review</option>
                            <option value="SHORTLISTED">Shortlisted</option>
                            <option value="REJECTED">Rejected</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <div class="d-flex gap-2">
                            <button onclick="applyFilters()" class="btn btn-primary fw-bold flex-grow-1"><i class="bi bi-funnel-fill me-1"></i> Apply Filter</button>
                            <button onclick="resetFilters()" class="btn btn-light border text-secondary fw-bold" title="Reset"><i class="bi bi-arrow-counterclockwise"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bulk Actions -->
        <div id="bulkActions" class="alert alert-info border-info border d-none justify-content-between align-items-center shadow-sm rounded-4 mb-4">
            <div class="fs-6">
                <span id="selectedCount" class="fw-bold text-primary fs-5 me-1">0</span> 
                <span class="fw-semibold text-dark">applicants selected</span>
            </div>
            <div class="d-flex gap-2">
                <button onclick="openBulkStatusModal('SHORTLISTED')" class="btn btn-success fw-bold d-flex align-items-center gap-1">
                    <i class="bi bi-check2-all"></i> Bulk Shortlist
                </button>
                <button onclick="openBulkStatusModal('REJECTED')" class="btn btn-danger fw-bold d-flex align-items-center gap-1">
                    <i class="bi bi-x-circle-fill"></i> Bulk Reject
                </button>
                <button onclick="clearSelection()" class="btn btn-light fw-bold border text-secondary">Cancel</button>
            </div>
        </div>

        <!-- Grid -->
        <div id="applicantGrid" class="row g-4 pb-5">
            <div th:each="app : ${applications}" class="col-lg-4 col-md-6 candidate-card-wrapper"
                 th:data-skills="${#strings.listJoin(app.jobSeeker.skills, ',').toLowerCase()}"
                 th:data-exp="${app.jobSeeker.totalExperienceYears ?: 0}"
                 th:data-edu="${app.jobSeeker.degree ?: 'Not Specified'}" 
                 th:data-status="${app.status}"
                 th:data-date="${app.appliedDate}">
                 
                <div class="card h-100 border candidate-card shadow-sm rounded-4 position-relative"
                     th:classappend="${app.status.name() == 'APPLIED'} ? 'border-primary' : 
                                  (${app.status.name() == 'SHORTLISTED'} ? 'border-success' : 
                                   (${app.status.name() == 'REJECTED'} ? 'border-danger' : 
                                    (${app.status.name() == 'UNDER_REVIEW'} ? 'border-warning' : 'border-secondary')))"
                     th:style="'border-top-width: 5px !important;'">

                    <div class="card-body p-4 d-flex flex-column">
                        <div class="d-flex justify-content-between align-items-start mb-3">
                            <h3 th:text="${app.jobSeeker.fullName}" class="h4 fw-bold text-dark m-0">Candidate Name</h3>
                            <span th:text="${app.status}" 
                                  class="badge rounded-pill text-uppercase fw-bold"
                                  th:classappend="${app.status.name() == 'APPLIED'} ? 'bg-primary' : 
                                               (${app.status.name() == 'SHORTLISTED'} ? 'bg-success' : 
                                                (${app.status.name() == 'REJECTED'} ? 'bg-danger' : 
                                                 (${app.status.name() == 'UNDER_REVIEW'} ? 'bg-warning text-dark' : 'bg-secondary')))">
                            </span>
                        </div>

                        <div class="mb-4 text-secondary fs-6 flex-grow-1">
                            <div class="mb-2">
                                <span class="fw-bold text-dark">Applied for:</span>
                                <span th:text="${app.job.title}" class="fw-semibold text-primary">Job Title</span>
                            </div>
                            <div class="mb-2">
                                <span class="fw-bold text-dark">Date:</span>
                                <span th:text="${app.appliedDate != null ? #temporals.format(app.appliedDate, 'MMM dd, yyyy') : 'N/A'}"></span>
                            </div>
                            <div class="mb-2">
                                <span class="fw-bold text-dark">Education:</span>
                                <span th:text="${(app.jobSeeker.degree != null and app.jobSeeker.degree != '') ? app.jobSeeker.degree : 
                                       (app.jobSeeker.educationEntities != null and !app.jobSeeker.educationEntities.isEmpty() ? app.jobSeeker.educationEntities[0].degree : 
                                       (app.jobSeeker.education != null and !app.jobSeeker.education.isEmpty() ? app.jobSeeker.education[0].degree : 'Not Specified'))}"></span>
                            </div>
                            <div class="mb-3">
                                <span class="fw-bold text-dark">Experience:</span>
                                <span th:text="${app.jobSeeker.totalExperienceYears != null ? app.jobSeeker.totalExperienceYears + ' Years' : 'Fresher'}"></span>
                            </div>
                            
                            <div class="fw-bold text-dark mb-1">Skills:</div>
                            <div class="d-flex flex-wrap gap-1">
                                <!-- From skillEntities -->
                                <span th:each="skill : ${app.jobSeeker.skillEntities}" th:text="${skill.name}" class="badge bg-light text-primary border px-2 py-1"></span>
                                <!-- From skills Set -->
                                <span th:each="skill : ${app.jobSeeker.skills}" th:text="${skill}" class="badge bg-light text-primary border px-2 py-1"></span>
                                <!-- Fallback -->
                                <span th:if="${(app.jobSeeker.skillEntities == null or app.jobSeeker.skillEntities.isEmpty()) and (app.jobSeeker.skills == null or app.jobSeeker.skills.isEmpty())}" class="small text-muted fst-italic">None listed</span>
                            </div>
                        </div>

                        <div class="d-flex gap-2 pt-3 border-top mt-auto">
                            <!-- Update Status Button -->
                            <button type="button" th:if="${app.status.name() != 'WITHDRAWN'}" 
                                    th:onclick="'openStatusModal(' + ${app.id} + ', \'\')'" 
                                    class="btn btn-primary btn-sm flex-fill fw-bold d-flex align-items-center justify-content-center gap-1" title="Update Status">
                                <i class="bi bi-arrow-repeat"></i> <span class="d-none d-xl-inline">Status</span>
                            </button>
                            <button type="button" th:if="${app.status.name() == 'WITHDRAWN'}" disabled 
                                    class="btn btn-secondary btn-sm flex-fill fw-bold d-flex align-items-center justify-content-center gap-1">
                                <i class="bi bi-x-circle"></i> Withdrawn
                            </button>

                            <!-- Add Note Button -->
                            <button type="button" th:onclick="'openNoteModal(' + ${app.id} + ')'" 
                                    class="btn btn-info text-white btn-sm flex-fill fw-bold d-flex align-items-center justify-content-center gap-1" title="Add Note">
                                <i class="bi bi-sticky-fill"></i> <span class="d-none d-xl-inline">Note</span>
                            </button>

                            <!-- View Profile Button -->
                            <a th:href="@{/employer/applicant/{applicationId}(applicationId=${app.id})}" 
                               class="btn btn-success btn-sm flex-fill fw-bold d-flex align-items-center justify-content-center gap-1 text-decoration-none" title="View Profile">
                                <i class="bi bi-person-badge-fill"></i> <span class="d-none d-xl-inline">Profile</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Empty State -->
            <div th:if="${applications == null or applications.isEmpty()}" class="col-12 text-center py-5">
                <i class="bi bi-inbox-fill display-1 text-muted mb-3 d-block"></i>
                <h4 class="fw-bold text-dark">No applicants yet</h4>
                <p class="text-secondary">When job seekers apply to your postings, they will appear here.</p>
            </div>
        </div>

        <!-- NOTE MODAL (Bootstrap native) -->
        <div class="modal fade" id="noteModal" tabindex="-1" aria-labelledby="noteModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content rounded-4 border-0 shadow">
                    <div class="modal-header border-bottom">
                        <h5 class="modal-title fw-bold" id="noteModalLabel"><i class="bi bi-sticky-fill text-info me-2"></i> Add Internal Note</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form id="noteForm" th:action="@{/applications/add-notes}" method="post">
                        <div class="modal-body p-4">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <input type="hidden" name="applicationId" id="noteApplicationId" />
                            <div class="mb-3">
                                <label class="form-label fw-bold">Your Note</label>
                                <textarea name="notes" id="noteContent" required class="form-control" rows="5" placeholder="Internal tracking notes..."></textarea>
                            </div>
                        </div>
                        <div class="modal-footer border-top bg-light rounded-bottom-4">
                            <button type="button" class="btn btn-light border fw-bold text-secondary" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-info text-white fw-bold">Save Note</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- STATUS MODAL (Bootstrap native) -->
        <div class="modal fade" id="statusModal" tabindex="-1" aria-labelledby="statusModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content rounded-4 border-0 shadow">
                    <div class="modal-header border-bottom">
                        <h5 class="modal-title fw-bold" id="statusModalLabel"><i class="bi bi-arrow-repeat text-primary me-2"></i> Update Status</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form id="statusForm" method="post">
                        <div class="modal-body p-4">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <div class="mb-3">
                                <label class="form-label fw-bold">New Status</label>
                                <select name="status" id="targetStatus" required class="form-select">
                                    <option value="" disabled selected>Select Status</option>
                                    <option value="UNDER_REVIEW">Under Review</option>
                                    <option value="SHORTLISTED">Shortlisted</option>
                                    <option value="REJECTED">Rejected</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Notes / Reason (Optional)</label>
                                <textarea name="notes" id="statusNotes" class="form-control" rows="3" placeholder="Optional notes for candidate..."></textarea>
                            </div>
                        </div>
                        <div class="modal-footer border-top bg-light rounded-bottom-4">
                            <button type="button" class="btn btn-light border fw-bold text-secondary" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary fw-bold">Update Status</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </div>

    <footer th:replace="~{fragments/footer :: footer}"></footer>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Common Fragments Scripts -->
    <script th:replace="~{fragments/header :: header-js}"></script>
    
    <!-- Extracted External JS -->
    <script src="/js/employer-applicants.js"></script>
</body>

</html>
