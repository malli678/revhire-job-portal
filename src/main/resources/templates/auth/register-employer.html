<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register as Employer - RevHire</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .form-row {
            display: flex;
            gap: 15px;
        }
        .form-group {
            margin-bottom: 20px;
            flex: 1;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e1e1;
            border-radius: 6px;
            font-size: 15px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #11998e;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(17, 153, 142, 0.4);
        }
        .error {
            color: red;
            font-size: 14px;
            margin-top: 5px;
        }
        .alert-error {
            background: #fee;
            color: #c00;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid #fcc;
        }
        .alert-success {
            background: #efe;
            color: #060;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid #cfc;
        }
        .login-link {
            margin-top: 15px;
            text-align: center;
        }
        .login-link a {
            color: #11998e;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Register Your Company</h2>
        <p class="subtitle">Post jobs and find the best talent</p>
        
        <div th:if="${error}" class="alert-error" th:text="${error}"></div>
        <div th:if="${success}" class="alert-success" th:text="${success}"></div>
        
        <form th:action="@{/auth/register/employer}" th:object="${registrationDto}" method="post">
            <div class="form-row">
                <div class="form-group">
                    <label>Your Name *</label>
                    <input type="text" th:field="*{fullName}" placeholder="Your full name" required>
                    <span th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" class="error"></span>
                </div>
                
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" th:field="*{email}" placeholder="Your email" required>
                    <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error"></span>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Password *</label>
                    <input type="password" th:field="*{password}" placeholder="Create password" required minlength="6">
                    <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="error"></span>
                </div>
                
                <div class="form-group">
                    <label>Confirm Password *</label>
                    <input type="password" th:field="*{confirmPassword}" placeholder="Confirm password" required>
                    <span th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}" class="error"></span>
                </div>
            </div>
            
            <div class="form-group">
                <label>Company Name *</label>
                <input type="text" th:field="*{companyName}" placeholder="Your company name" required>
                <span th:if="${#fields.hasErrors('companyName')}" th:errors="*{companyName}" class="error"></div>
            
            <div class="span>
            </form-row">
                <div class="form-group">
                    <label>Industry *</label>
                    <select th:field="*{industry}" required>
                        <option value="">Select industry</option>
                        <option value="IT">Information Technology</option>
                        <option value="Finance">Finance & Banking</option>
                        <option value="Healthcare">Healthcare</option>
                        <option value="Education">Education</option>
                        <option value="Retail">Retail & E-commerce</option>
                        <option value="Manufacturing">Manufacturing</option>
                        <option value="Marketing">Marketing & Advertising</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Company Size *</label>
                    <select th:field="*{companySize}" required>
                        <option value="">Select size</option>
                        <option value="1-10">1-10 employees</option>
                        <option value="11-50">11-50 employees</option>
                        <option value="51-200">51-200 employees</option>
                        <option value="201-500">201-500 employees</option>
                        <option value="500+">500+ employees</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label>Company Website</label>
                <input type="text" th:field="*{companyWebsite}" placeholder="https://www.yourcompany.com">
            </div>
            
            <div class="form-group">
                <label>Headquarters Location</label>
                <input type="text" th:field="*{headquarters}" placeholder="City, Country">
            </div>
            
            <button type="submit">Register Company</button>
        </form>
        
        <div class="login-link">
            Already have an account? <a th:href="@{/auth/login}">Login here</a>
        </div>
    </div>
</body>
</html>
