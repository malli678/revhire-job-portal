<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Change Password - RevHire</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
        }

        h2 {
            text-align: center;
            color: #1e293b;
            margin-bottom: 30px;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #475569;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.2s;
            color: #1e293b;
        }

        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .hint {
            display: block;
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 6px;
            line-height: 1.4;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: background 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background: #0069d9;
        }

        .error {
            color: #dc2626;
            background: #fef2f2;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #fee2e2;
        }

        .success {
            color: #16a34a;
            background: #f0fdf4;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #dcfce7;
        }

        .strength-meter {
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
            display: none;
        }

        .strength-meter-fill {
            height: 100%;
            width: 0;
            transition: all 0.3s;
        }

        .strength-weak {
            background: #ef4444;
            width: 33%;
        }

        .strength-medium {
            background: #f59e0b;
            width: 66%;
        }

        .strength-strong {
            background: #10b981;
            width: 100%;
        }

        .links {
            text-align: center;
            margin-top: 25px;
        }

        .links a {
            color: #3b82f6;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Change Password</h2>

        <div th:if="${error}" class="error" th:text="${error}"></div>
        <div th:if="${success}" class="success" th:text="${success}"></div>

        <form th:action="@{/auth/change-password}" method="post">
            <div class="form-group">
                <label>Current Password</label>
                <input type="password" name="currentPassword" required placeholder="Enter current password">
            </div>

            <div class="form-group">
                <label>New Password</label>
                <input type="password" name="newPassword"
                    placeholder="8-20 chars with uppercase, lowercase, number & special char" required minlength="8"
                    maxlength="20" pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).+$"
                    title="Must contain at least one uppercase letter, one lowercase letter, one digit, and one special character (@$!%*?&)">
                <span class="hint">Must contain uppercase, lowercase, number and special character (@$!%*?&)</span>
                <div class="strength-meter" id="strengthMeter">
                    <div class="strength-meter-fill" id="strengthMeterFill"></div>
                </div>
            </div>

            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" name="confirmPassword" required placeholder="Re-enter new password">
            </div>

            <button type="submit">Change Password</button>
        </form>

        <div class="links">
            <a th:href="@{/dashboard}">Back to Dashboard</a>
        </div>
    </div>

    <script>
        const passwordInput = document.querySelector('input[name="newPassword"]');
        const meter = document.getElementById('strengthMeter');
        const meterFill = document.getElementById('strengthMeterFill');

        passwordInput.addEventListener('input', () => {
            const val = passwordInput.value;
            if (val.length === 0) {
                meter.style.display = 'none';
                return;
            }

            meter.style.display = 'block';
            let strength = 0;
            if (val.length >= 8) strength++;
            if (/[A-Z]/.test(val) && /[a-z]/.test(val)) strength++;
            if (/[0-9]/.test(val) && /[@$!%*?&]/.test(val)) strength++;

            meterFill.className = 'strength-meter-fill';
            if (strength === 1) meterFill.classList.add('strength-weak');
            else if (strength === 2) meterFill.classList.add('strength-medium');
            else if (strength === 3) meterFill.classList.add('strength-strong');
        });
    </script>
</body>

</html>
