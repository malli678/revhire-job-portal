<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Verification - RevHire</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header-box {
            background: #2D3E75;
            color: white;
            padding: 40px 20px;
            text-align: center;
            position: relative;
        }

        .header-box h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .header-box p {
            font-size: 0.85rem;
            opacity: 0.8;
            line-height: 1.4;
        }

        .header-box .icon {
            font-size: 2rem;
            margin-bottom: 15px;
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            width: 50px;
            height: 50px;
            line-height: 50px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .content-box {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #1a202c;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .email-display {
            background: #f1f5f9;
            padding: 12px 16px;
            border-radius: 8px;
            color: #4a5568;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.2s;
            color: #1a202c;
        }

        input:focus {
            outline: none;
            border-color: #2D3E75;
            box-shadow: 0 0 0 3px rgba(45, 62, 117, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: #2D3E75;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #1e2a52;
        }

        .alert-error {
            background: #fff5f5;
            color: #c53030;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #feb2b2;
            margin-bottom: 20px;
            font-size: 0.85rem;
            text-align: center;
        }

        .links {
            text-align: center;
            margin-top: 30px;
            font-size: 0.85rem;
        }

        .links a {
            color: #718096;
            text-decoration: none;
            transition: color 0.2s;
        }

        .links a:hover {
            color: #2D3E75;
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header-box">
            <div class="icon">🛡️</div>
            <h2>Identity Verification</h2>
            <p>Answer your security question to reset your password.</p>
        </div>

        <div class="content-box">
            <div th:if="${error}" class="alert-error" th:text="${error}"></div>

            <form th:action="@{/auth/verify-security-answer}" method="post">
                <input type="hidden" name="email" th:value="${email}" />

                <label>Registered Email</label>
                <div class="email-display">
                    <span>📧</span>
                    <span th:text="${email}">user@example.com</span>
                </div>

                <div class="form-group">
                    <label th:text="${securityQuestion}">What is your favorite color?</label>
                    <input type="text" name="answer" placeholder="e.g. Blue" required autofocus>
                </div>

                <button type="submit">Verify Identity</button>
            </form>

            <div class="links">
                <a th:href="@{/auth/login}">← Return to Login</a>
            </div>
        </div>
    </div>
</body>

</html>
