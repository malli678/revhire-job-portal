<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Reset Password - RevHire</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 450px;
            padding: 40px;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e1e1;
            border-radius: 6px;
            font-size: 15px;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .error {
            color: red;
            text-align: center;
            margin-bottom: 15px;
        }

        .success {
            color: #28a745;
            text-align: center;
            margin-bottom: 15px;
            background: #e8f5e9;
            padding: 10px;
            border-radius: 6px;
        }

        .links {
            text-align: center;
            margin-top: 15px;
        }

        .links a {
            color: #667eea;
            text-decoration: none;
        }

        .back-link {
            text-align: center;
            margin-top: 15px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Reset Password</h2>
        <p class="subtitle">Enter your new password</p>

        <div th:if="${error}" class="error" th:text="${error}"></div>
        <div th:if="${success}" class="success" th:text="${success}"></div>

        <div th:if="${token} and ${success == null}" class="success">
            Verification successful! Please set your new password.
        </div>

        <form th:action="@{/auth/reset-password}" method="post">
            <input type="hidden" name="token" th:value="${token}">

            <div class="form-group">
                <label>New Password</label>
                <input type="password" name="newPassword"
                    placeholder="8-20 chars with uppercase, lowercase, number & special char" required minlength="8"
                    maxlength="20" pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).+$"
                    title="Must contain at least one uppercase letter, one lowercase letter, one digit, and one special character (@$!%*?&)">
                <small style="display:block; font-size:11px; color:#6c757d; margin-top:5px;">Must contain uppercase,
                    lowercase, number and special character (@$!%*?&)</small>
            </div>

            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" name="confirmPassword" placeholder="Confirm new password" required>
            </div>

            <button type="submit">Reset Password</button>
        </form>

        <div class="back-link">
            <a th:href="@{/auth/login}">Back to Login</a>
        </div>
    </div>
</body>

</html>
