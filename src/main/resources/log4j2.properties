# Log4J2 Configuration
name=RevHire Logging Configuration

# Appenders
appenders = console, file

# Console Appender
appender.console.type = Console
appender.console.name = STDOUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} %-5p %c{1}:%L - %m%n

# File Appender
appender.file.type = File
appender.file.name = LOGFILE
appender.file.fileName = logs/revhire.log
appender.file.layout.type = PatternLayout
appender.file.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} %-5p %c{1}:%L - %m%n

# Root Logger
rootLogger.level = info
rootLogger.appenderRefs = stdout, file
rootLogger.appenderRef.stdout.ref = STDOUT
rootLogger.appenderRef.file.ref = LOGFILE

# Application specific loggers
logger.revhire.name = com.revhire
logger.revhire.level = debug
logger.revhire.appenderRefs = file
logger.revhire.appenderRef.file.ref = LOGFILE

# Spring Framework logging
logger.spring.name = org.springframework
logger.spring.level = warn

# Hibernate logging
logger.hibernate.name = org.hibernate
logger.hibernate.level = warn
logger.hibernate.SQL.level = debug
logger.hibernate.type.descriptor.sql.level = trace