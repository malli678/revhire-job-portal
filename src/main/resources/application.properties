# ✅ Application
spring.application.name=revhire

# ✅ Oracle Database Configuration
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/XEPDB1
spring.datasource.username=Bhanu
spring.datasource.password=Bhanu1234
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# ✅ JPA / Hibernate (Boot 4 Compatible)
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update

# ✅ SQL Logging (VERY useful during development)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ✅ Debug SQL (Optional but helpful)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ✅ File Upload Limits (IMPORTANT for Resume Upload)
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# ✅ Server (Optional)
server.port=8080