# ========================
# Application Name
# ========================
spring.application.name=revhire

# ========================
# Database Configuration (Oracle)
# ========================
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/XEPDB1
spring.datasource.username=revhire_p2
spring.datasource.password=RevHire2026
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# ========================
# JPA / Hibernate Configuration
# ========================
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# ========================
# Thymeleaf Configuration
# ========================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ========================
# Server Configuration
# ========================
server.port=8080
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false

# ========================
# File Upload Configuration
# ========================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=10MB

# ========================
# Logging Configuration
# ========================
logging.level.root=INFO
logging.level.com.revhire=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ========================
# JWT Configuration
# ========================
jwt.secret=YourSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong!
jwt.expiration=86400000

# ========================
# DevTools Configuration
# ========================
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Add these to your application.properties

# ========================
# Notification Settings
# ========================
notification.retention.days=30
notification.batch.size=50

# ========================
# Scheduling Configuration
# ========================
spring.task.scheduling.pool.size=5

# ========================
# File Upload Directory (Make configurable)
# ========================
file.upload.directory=uploads/

# ========================
# Email Configuration
# ========================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=revhire.notifications@gmail.com
spring.mail.password=your-app-password  # Use App Password, not regular password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Application URL for email links
app.base.url=http://localhost:8080